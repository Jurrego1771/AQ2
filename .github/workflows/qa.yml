name: QA

# Suite QA standalone (no conectada al código del SUT). Por ahora SOLO dev
# (los ambientes productivos quedan para después — la groundwork está en
# knowledge-core/environments.md, src/utils/totp.js y el prodGuard de los specs).
#
# Estrategia (deploy-aligned; deploys Lun/Jue ~22:00 UTC):
#  - Gate (push/PR a este repo): valida que los tests nuevos quedan verdes.
#  - Post-deploy (Mar/Vie 01:00 UTC): regresión completa (caza lo que rompió el deploy).
#  - Canario diario (12:00 UTC): smoke (liveness barato del producto).
#  - Manual (workflow_dispatch): elige scope.
#
# SECRETS (Settings > Secrets and variables > Actions). Nombres = los que lee
# src/utils/env.js: BASE_URL_DEV, TEST_USER_DEV, TEST_PASS_DEV.

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'knowledge-core/**']
  pull_request:
    paths-ignore: ['**/*.md', 'knowledge-core/**']
  schedule:
    - cron: '0 1 * * 2,5'   # post-deploy: Mar y Vie 01:00 UTC (tras deploy Lun/Jue)
    - cron: '0 12 * * *'    # canario diario 12:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: 'Qué correr'
        type: choice
        default: gate
        options: [gate, full, smoke, regression, api, e2e]

# Serializa contra el dev compartido: un run a la vez (no cancela en curso para no
# matar un post-deploy con un push; los demás esperan turno).
concurrency:
  group: live-qa-dev
  cancel-in-progress: false

env:
  CI: 'true'
  ENV: dev
  BASE_URL_DEV: ${{ secrets.BASE_URL_DEV }}
  TEST_USER_DEV: ${{ secrets.TEST_USER_DEV }}
  TEST_PASS_DEV: ${{ secrets.TEST_PASS_DEV }}

jobs:
  qa:
    name: QA dev
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Resolver versión de Playwright
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - run: npx playwright install --with-deps chromium

      # Decide qué projects correr según el evento/cron/scope.
      #  - cron post-deploy (Mar/Vie) -> suite completa
      #  - cron diario               -> smoke (canario)
      #  - workflow_dispatch         -> según input.scope
      #  - push / pull_request       -> gate (smoke + api)
      - name: Resolver projects
        id: scope
        run: |
          setup="--project=setup"
          gate="$setup --project=smoke --project=api"
          full="$setup --project=smoke --project=regression --project=api --project=e2e"
          case "${{ github.event_name }}" in
            schedule)
              if [ "${{ github.event.schedule }}" = "0 1 * * 2,5" ]; then projects="$full"; else projects="$setup --project=smoke"; fi ;;
            workflow_dispatch)
              case "${{ github.event.inputs.scope }}" in
                full) projects="$full" ;;
                smoke) projects="$setup --project=smoke" ;;
                regression) projects="$setup --project=regression" ;;
                api) projects="$setup --project=api" ;;
                e2e) projects="$setup --project=e2e" ;;
                *) projects="$gate" ;;
              esac ;;
            *) projects="$gate" ;;
          esac
          echo "projects=$projects" >> "$GITHUB_OUTPUT"
          echo "projects=$projects"

      - run: npx playwright test ${{ steps.scope.outputs.projects }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
