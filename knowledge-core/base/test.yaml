# PLANTILLA: Tests - Risk-Based Testing
# ================================================================
# Proposito: Guia para documentar tests asociados a un modulo
# Uso: Copiar y completar para cada modulo del sistema
# Agentes: Usar esta estructura para generar tests completos
# ================================================================

version: 1
modulo: "[NOMBRE_DEL_MODULO]"                    # ej: media, users, billing
ultima_actualizacion: 'YYYY-MM-DD'

tests:
  # ------------------------------------------------------------
  # CAMPO id
  # Formato: [PREFIX]-TC-[NUMERO]
  # - PREFIX: 3-4 letras del modulo en mayusculas
  # - TC: Test Case
  # - NUMERO: 3 digitos, secuencial por modulo
  # ------------------------------------------------------------
  - id: "[PREFIX]-TC-[NUMERO]"

    # ------------------------------------------------------------
    # CAMPO titulo
    # Maximo 80 caracteres
    # Formato: [Accion] + [condicion] + [resultado esperado]
    # ------------------------------------------------------------
    titulo: "[Accion que se prueba] con [condicion] devuelve [resultado]"

    # ------------------------------------------------------------
    # CAMPO modulo
    # Modulo principal al que pertenece el test
    # ------------------------------------------------------------
    modulo: "[modulo-principal]"

    # ------------------------------------------------------------
    # CAMPO tipo
    # Valores permitidos:
    # - smoke: Test rapido de verificacion basic
    # - regression: Test de regresion funcional
    # - e2e: Test end-to-end completo
    # - integration: Test de integracion entre modulos
    # - security: Test de seguridad
    # - performance: Test de rendimiento
    # ------------------------------------------------------------
    tipo: "[smoke|regression|e2e|integration|security|performance]"

    # ------------------------------------------------------------
    # CAMPO prioridad
    # Valores permitidos:
    # - critical: Test bloqueante, debe pasar siempre
    # - high: Test importante para release
    # - medium: Test deseable
    # - low: Test nice-to-have
    # ------------------------------------------------------------
    prioridad: "[critical|high|medium|low]"

    # ------------------------------------------------------------
    # CAMPO estado
    # Valores permitidos:
    # - active: Test en uso activo
    # - deprecated: Test en desuso
    # - archived: Test archivado
    # ------------------------------------------------------------
    estado: "[active|deprecated|archived]"

    # ------------------------------------------------------------
    # CAMPO refs (FUENTE UNICA de los vinculos del test)
    # El test declara a que sirve. Todo reverse-link (validado_por_test en
    # historias, mitigado_por_test en riesgos, cobertura) se DERIVA de aqui.
    # Listas: un test puede validar varios AC y mitigar varios riesgos (N:N).
    # El spec lleva en su titulo SOLO el id de correlacion (@PREFIX-TC-N) + la capa.
    # ------------------------------------------------------------
    refs:
      validates: ["[AC-ID-XXX]"]       # AC(s) que valida este test
      mitigates: ["[PREFIX]-RISK-[N]"] # Riesgo(s) que mitiga (vacio si no aplica)
      story: "[US-ID-XXX]"             # Historia de usuario
      spec: "[ruta/al/spec.js]"        # Ruta al archivo de spec

    # ------------------------------------------------------------
    # CAMPO pasos
    # Pasos de ejecucion del test (opcional)
    # ------------------------------------------------------------
    pasos:
      - "[Paso 1: accion a realizar]"
      - "[Paso 2: verificacion esperada]"
      - "[Paso 3: accion siguiente]"

    # ------------------------------------------------------------
    # CAMPO test_data
    # Datos de prueba utilizados (opcional)
    # ------------------------------------------------------------
    test_data:
      - escenario: "[nombre del escenario]"
        datos: "[datos especificos para este escenario]"
        esperado: "[resultado esperado]"


