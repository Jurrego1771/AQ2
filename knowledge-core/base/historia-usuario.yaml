# PLANTILLA: Historias de Usuario - Risk-Based Testing
# ================================================================
# Proposito: Guia para documentar historias de usuario vinculadas a riesgos
# Uso: Copiar y completar para cada feature del sistema
# Agentes: Usar esta estructura para generar user stories completas
# ================================================================

version: 1
epic: "[NOMBRE_DE_LA_EPIC]"                      # ej: Video Playback, User Management
ultima_actualizacion: 'YYYY-MM-DD'

stories:
  # ------------------------------------------------------------
  # CAMPO id
  # Formato: US-[NUMERO]
  # Numero: 3 digitos, secuencial global
  # ------------------------------------------------------------
  - id: "US-[NUMERO]"

    # ------------------------------------------------------------
    # CAMPO titulo
    # Maximo 80 caracteres
    # Formato: [Verbo] + [recurso] + [condicion/valor]
    # ------------------------------------------------------------
    titulo: "[Verbo de accion] [recurso] [condicion o beneficio]"

    # ------------------------------------------------------------
    # CAMPO rol
    # Quién realiza la accion (contexto del usuario)
    # ------------------------------------------------------------
    rol: "[tipo de usuario]"                      # ej: usuario de streaming, admin

    # ------------------------------------------------------------
    # CAMPO meta
    # Que quiere lograr el usuario
    # ------------------------------------------------------------
    meta: "[accion o resultado que desea obtener]"

    # ------------------------------------------------------------
    # CAMPO beneficio
    # Valor de negocio o experiencia
    # ------------------------------------------------------------
    beneficio: "[impacto positivo para el usuario o negocio]"

    # ------------------------------------------------------------
    # CAMPO descripcion
    # Historia en formato "Como... Quiero... Para...
    # ------------------------------------------------------------
    descripcion: |
      Como [rol del usuario],
      quiero [功能 o accion],
      para [beneficio o valor de negocio].

    # ------------------------------------------------------------
    # CAMPO acceptance_criteria
    # El AC es la INTENCION (comportamiento esperado). Que test lo valida NO
    # se escribe aqui: es DERIVADO. El build lo calcula desde tests.yaml ->
    # refs.validates. Un AC sin test que lo valide es un GAP que reporta el build.
    # ------------------------------------------------------------
    acceptance_criteria:
      - id: "AC-[NUMERO]"
        criterio: "[Criterio medible y verificable]"

    # ------------------------------------------------------------
    # CAMPO prioridad
    # Valores permitidos:
    # - critical: MVP obligatorio, sin esto no hay release
    # - high: Importante, debe incluirse
    # - medium: Deseable para esta iteracion
    # - low: Nice-to-have, puede esperar
    # ------------------------------------------------------------
    prioridad: "[critical|high|medium|low]"

    # ------------------------------------------------------------
    # CAMPO tipo
    # Valores permitidos:
    # - feature: Nueva funcionalidad
    # - bugfix: Correccion de defecto
    # - refactor: Mejora tecnica
    # - spike: Investigacion
    # ------------------------------------------------------------
    tipo: "[feature|bugfix|refactor|spike]"

    # ------------------------------------------------------------
    # CAMPO dependencias
    # Servicios o modulos de los que depende esta historia
    # ------------------------------------------------------------
    dependencias:
      - "[servicio/modulo-1]"
      - "[servicio/modulo-2]"

    # NOTA: riesgos_asociados y tests_asociados NO se escriben aqui. Los
    # vinculos los declara el test (tests.yaml -> refs) y los calcula el build.

    # ------------------------------------------------------------
    # CAMPO notas
    # Informacion adicional relevante
    # ------------------------------------------------------------
    notas: |
      [Decisiones de diseño, constraints tecnicos,等信息 adicional]
