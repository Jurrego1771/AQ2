# Historias de Usuario - Epic Media Management
# Solo intencion: US + AC. Los vinculos a tests/riesgos los declara el test
# (tests.yaml -> refs) y los calcula el build. Aqui NO hay reverse-links.
# AC ids unicos por modulo: MED-AC-N.
version: 1
epic: "Media Management"
ultima_actualizacion: '2026-06-20'

stories:
  - id: "US-001"
    titulo: "Buscar media por titulo en el listado"
    rol: "administrador de contenido"
    meta: "encontrar rapidamente un media por su titulo"
    beneficio: "gestionar la biblioteca sin recorrer cientos de items"
    descripcion: |
      Como administrador de contenido,
      quiero buscar mis medias por titulo desde el listado,
      para localizar y operar un media sin paginar manualmente.

    acceptance_criteria:
      - id: "MED-AC-1"
        criterio: "Buscar un termino existente filtra el listado a los medias cuyo titulo coincide"
      - id: "MED-AC-2"
        criterio: "Una busqueda sin coincidencias muestra un estado vacio claro y 0 cards"
      - id: "MED-AC-3"
        criterio: "Limpiar la busqueda restaura el listado completo"
      - id: "MED-AC-4"
        criterio: "El termino de busqueda se refleja en la URL (compartible y persistente al recargar)"
      - id: "MED-AC-5"
        criterio: "El contador de resultados refleja la cantidad real (0 cuando no hay coincidencias)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media"

    notas: |
      MED-AC-4 y MED-AC-5 estan en rojo (bugs AQ2#2 y AQ2#1): sus tests existen
      como pruebas vivas marcadas test.fail(). Cobertura y vinculos se derivan en el build.

  - id: "US-002"
    titulo: "Filtrar y paginar el listado de media"
    rol: "administrador de contenido"
    meta: "acotar y recorrer el listado por tipo, tamano de pagina y paginas"
    beneficio: "navegar una biblioteca grande sin saturarse de items"
    descripcion: |
      Como administrador de contenido,
      quiero filtrar el listado por tipo y controlar la paginacion,
      para encontrar y recorrer mis medias de forma eficiente.

    acceptance_criteria:
      - id: "MED-AC-6"
        criterio: "Filtrar por tipo (Video) reduce el listado a ese tipo y marca el filtro como activo"
      - id: "MED-AC-7"
        criterio: "Quitar el filtro de tipo restaura el listado completo"
      - id: "MED-AC-8"
        criterio: "Cambiar items por pagina ajusta cuantas cards se muestran"
      - id: "MED-AC-9"
        criterio: "Avanzar de pagina (Next) navega el conjunto y refleja skip en la URL"
      - id: "MED-AC-10"
        criterio: "El estado de filtros se refleja en la URL (compartible y persistente al recargar)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media"

    notas: |
      MED-AC-10 esta en rojo (bug AQ2#11): el estado de filtros/per-page no se
      serializa en la URL (solo skip/sort). Test vivo marcado test.fail().

  - id: "US-003"
    titulo: "Editar la informacion basica de un media"
    rol: "administrador de contenido"
    meta: "actualizar titulo, descripcion y categoria de un media"
    beneficio: "mantener los metadatos correctos sin re-subir el contenido"
    descripcion: |
      Como administrador de contenido,
      quiero editar la informacion basica de un media y guardarla,
      para corregir o enriquecer sus metadatos.

    acceptance_criteria:
      - id: "MED-AC-11"
        criterio: "Abrir un media muestra el form de Basic Information (titulo, descripcion, guardar)"
      - id: "MED-AC-12"
        criterio: "Editar la descripcion y guardar persiste el cambio (verificable por API)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media (provisioning self-contained: ingesta remota + transcoding)"

    notas: |
      El test crea su propio media por ingesta remota (gate de transcoding) y lo
      borra al terminar. La cuenta tiene force_category_fill: se asigna categoria
      antes de guardar. Riesgo conocido al guardar: MED-RISK-007 (#12).
      Gap de testabilidad: campos de edicion sin marca sm: (#13).
