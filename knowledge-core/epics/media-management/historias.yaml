# Historias de Usuario - Epic Media Management
# Solo intencion: US + AC. Los vinculos a tests/riesgos los declara el test
# (tests.yaml -> refs) y los calcula el build. Aqui NO hay reverse-links.
version: 1
epic: "Media Management"
ultima_actualizacion: '2026-06-20'

stories:
  - id: "US-001"
    titulo: "Buscar media por titulo en el listado"
    rol: "administrador de contenido"
    meta: "encontrar rapidamente un media por su titulo"
    beneficio: "gestionar la biblioteca sin recorrer cientos de items"
    descripcion: |
      Como administrador de contenido,
      quiero buscar mis medias por titulo desde el listado,
      para localizar y operar un media sin paginar manualmente.

    acceptance_criteria:
      - id: "AC-1"
        criterio: "Buscar un termino existente filtra el listado a los medias cuyo titulo coincide"
      - id: "AC-2"
        criterio: "Una busqueda sin coincidencias muestra un estado vacio claro y 0 cards"
      - id: "AC-3"
        criterio: "Limpiar la busqueda restaura el listado completo"
      - id: "AC-4"
        criterio: "El termino de busqueda se refleja en la URL (compartible y persistente al recargar)"
      - id: "AC-5"
        criterio: "El contador de resultados refleja la cantidad real (0 cuando no hay coincidencias)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media"

    notas: |
      AC-4 y AC-5 estan en rojo (bugs AQ2#2 y AQ2#1): sus tests existen como
      pruebas vivas marcadas test.fail(). Cobertura y vinculos se derivan en el build.
