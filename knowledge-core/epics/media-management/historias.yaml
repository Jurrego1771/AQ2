# Historias de Usuario - Epic Media Management
# Solo intencion: US + AC. Los vinculos a tests/riesgos los declara el test
# (tests.yaml -> refs) y los calcula el build. Aqui NO hay reverse-links.
# AC ids unicos por modulo: MED-AC-N.
version: 1
epic: "Media Management"
ultima_actualizacion: '2026-07-03'

stories:
  - id: "US-001"
    titulo: "Buscar media por titulo en el listado"
    rol: "administrador de contenido"
    meta: "encontrar rapidamente un media por su titulo"
    beneficio: "gestionar la biblioteca sin recorrer cientos de items"
    descripcion: |
      Como administrador de contenido,
      quiero buscar mis medias por titulo desde el listado,
      para localizar y operar un media sin paginar manualmente.

    acceptance_criteria:
      - id: "MED-AC-1"
        criterio: "Buscar un termino existente filtra el listado a los medias cuyo titulo coincide"
      - id: "MED-AC-2"
        criterio: "Una busqueda sin coincidencias muestra un estado vacio claro y 0 cards"
      - id: "MED-AC-3"
        criterio: "Limpiar la busqueda restaura el listado completo"
      - id: "MED-AC-4"
        criterio: "El termino de busqueda se refleja en la URL (compartible y persistente al recargar)"
      - id: "MED-AC-5"
        criterio: "El contador de resultados refleja la cantidad real (0 cuando no hay coincidencias)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media"

    notas: |
      MED-AC-4 y MED-AC-5 estan en rojo (bugs AQ2#2 y AQ2#1): sus tests existen
      como pruebas vivas marcadas test.fail(). Cobertura y vinculos se derivan en el build.

  - id: "US-002"
    titulo: "Filtrar y paginar el listado de media"
    rol: "administrador de contenido"
    meta: "acotar y recorrer el listado por tipo, tamano de pagina y paginas"
    beneficio: "navegar una biblioteca grande sin saturarse de items"
    descripcion: |
      Como administrador de contenido,
      quiero filtrar el listado por tipo y controlar la paginacion,
      para encontrar y recorrer mis medias de forma eficiente.

    acceptance_criteria:
      - id: "MED-AC-6"
        criterio: "Filtrar por tipo (Video) reduce el listado a ese tipo y marca el filtro como activo"
      - id: "MED-AC-7"
        criterio: "Quitar el filtro de tipo restaura el listado completo"
      - id: "MED-AC-8"
        criterio: "Cambiar items por pagina ajusta cuantas cards se muestran"
      - id: "MED-AC-9"
        criterio: "Avanzar de pagina (Next) navega el conjunto y refleja skip en la URL"
      - id: "MED-AC-10"
        criterio: "El estado de filtros se refleja en la URL (compartible y persistente al recargar)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media"

    notas: |
      MED-AC-10 esta en rojo (bug AQ2#11): el estado de filtros/per-page no se
      serializa en la URL (solo skip/sort). Test vivo marcado test.fail().

  - id: "US-003"
    titulo: "Editar la informacion basica de un media"
    rol: "administrador de contenido"
    meta: "actualizar titulo, descripcion y categoria de un media"
    beneficio: "mantener los metadatos correctos sin re-subir el contenido"
    descripcion: |
      Como administrador de contenido,
      quiero editar la informacion basica de un media y guardarla,
      para corregir o enriquecer sus metadatos.

    acceptance_criteria:
      - id: "MED-AC-11"
        criterio: "Abrir un media muestra el form de Basic Information (titulo, descripcion, guardar)"
      - id: "MED-AC-12"
        criterio: "Editar la descripcion y guardar persiste el cambio (verificable por API)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media (provisioning self-contained: ingesta remota + transcoding)"

    notas: |
      El test crea su propio media por ingesta remota (gate de transcoding) y lo
      borra al terminar. La cuenta tiene force_category_fill: se asigna categoria
      antes de guardar. Riesgo conocido al guardar: MED-RISK-007 (#12).
      Gap de testabilidad: campos de edicion sin marca sm: (#13).

  - id: "US-004"
    titulo: "Agregar subtitulos a un media (upload y auto-generado por IA)"
    rol: "administrador de contenido"
    meta: "subir o generar subtitulos para un media"
    beneficio: "hacer el contenido accesible y multilenguaje sin editar el video"
    descripcion: |
      Como administrador de contenido,
      quiero subir un archivo de subtitulos o generarlo por IA,
      para ofrecer captions en uno o varios idiomas.

    acceptance_criteria:
      - id: "MED-AC-13"
        criterio: "El upload de subtitulo exige idioma + nombre + archivo: Save sigue deshabilitado hasta tener los tres"
      - id: "MED-AC-14"
        criterio: "El input de archivo de subtitulo restringe a formatos .vtt/.ass/.srt"
      - id: "MED-AC-15"
        criterio: "La generacion por IA exige nombre + idioma principal: Generate deshabilitado hasta tenerlos"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media/:id/subtitle"
      - "media transcodificado (provisioning self-contained)"

    notas: |
      Los triggers "Upload Subtitles"/"Auto Generate" viven en seccion colapsable.
      Backend convierte srt->vtt. Generacion IA es async (socket load-subtitles/error-subtitle):
      el spec valida el gate de validacion, no el resultado async del transcoder de speech.

  - id: "US-005"
    titulo: "Crear y validar ad markers (breaks) en un media"
    rol: "administrador de contenido / ad ops"
    meta: "insertar marcadores de ad break en posiciones validas del video"
    beneficio: "monetizar el contenido con cortes publicitarios en los tiempos correctos"
    descripcion: |
      Como ad ops,
      quiero crear ad markers en tiempos validos y que el sistema rechace tiempos invalidos,
      para insertar breaks utiles sin posiciones erroneas.

    acceptance_criteria:
      - id: "MED-AC-16"
        criterio: "Crear un ad marker via modal con un tiempo valido (0 < t < duracion) lo agrega a la tabla"
      - id: "MED-AC-17"
        criterio: "Un tiempo con formato invalido es rechazado con alerta y sin escritura (modal abierto)"
      - id: "MED-AC-18"
        criterio: "Un tiempo mayor a la duracion es rechazado con 'Time exceeds video duration'"
      - id: "MED-AC-19"
        criterio: "Una posicion fuera de rango (>= duracion o <= 0) debe rechazarse server-side, no solo en el modal"
      - id: "MED-AC-20"
        criterio: "Un ad marker manual debe ser distinguible (nombre no fijo 'Smart Ad Break' o editable)"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media/:id/track"
      - "media transcodificado con duracion conocida (provisioning self-contained)"

    notas: |
      MED-AC-19 y MED-AC-20 estan en rojo (bugs #15 y #14): tests vivos test.fail().
      new-ad-marker crea desde player.currentTime sin confirmacion; create-ad-marker abre modal
      manual. Ad markers cargan async (socket load-ad-tracks) -> esperar con expect.poll.

  - id: "US-012"
    titulo: "Publicar y despublicar un media desde el detalle"
    rol: "administrador de contenido"
    meta: "cambiar el estado Published de un media y confiar en que se refleje igual en todo el admin"
    beneficio: "controlar la visibilidad del contenido sin dudar de si el cambio realmente se aplico"
    descripcion: |
      Como administrador de contenido,
      quiero publicar o despublicar un media desde su detalle,
      para que el estado se refleje de forma consistente en el listado (grid,
      lista, minimal list) y al reabrir el detalle.

    acceptance_criteria:
      - id: "MED-AC-21"
        criterio: "Al publicar o despublicar y guardar, el estado Published/Not Published mostrado coincide en las 3 vistas del listado y en el detalle (reabierto), sin desincronizacion"

    prioridad: "medium"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/media (provisioning self-contained: ingesta remota + transcoding)"

    notas: |
      Se reporto un caso de un media que se veia Published en la grilla pero
      despublicado al abrir el detalle. Verificado en vivo (2026-07-03): no se
      reprodujo la desincronizacion, is_published viene siempre de una carga
      fresca por API en las 4 vistas. AC-21 protege ese comportamiento contra
      regresion. Gap de testabilidad relacionado: ningun indicador de estado
      Published tiene marca sm: (ver [[AQ2#35]]), los Page Objects usan una
      excepcion documentada (mismo patron que data-name, #13).
      Hallazgo aparte (no cubierto por este AC, sin issue filado aun): con
      force_category_fill activo, un media sin categoria bloquea el guardado
      del toggle Published en silencio (sin error visible).

  - id: "US-013"
    titulo: "Asignar un Show a un media sin ver entradas duplicadas o borradas"
    rol: "administrador de contenido"
    meta: "elegir el show correcto en el selector del detalle sin ambiguedad"
    beneficio: "asignar el show sin arriesgarme a elegir una entrada borrada o duplicada"
    descripcion: |
      Como administrador de contenido,
      quiero que el selector de Show del detalle de un media liste cada show
      una sola vez y solo shows activos,
      para asignar el show correcto sin confundirme con entradas borradas.

    acceptance_criteria:
      - id: "MED-AC-22"
        criterio: "El selector de Show del detalle no incluye shows con status distinto de OK (ej. DELETE), aunque compartan titulo con uno activo o entre si"

    prioridad: "high"
    tipo: "bugfix"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/show/list"

    notas: |
      Reporte de cliente (no encontrado por QA): un show aparecia listado 3
      veces al asignarlo desde Media, aunque en el modulo Show solo existe 1
      con ese nombre. Causa raiz: el picker de Show en Media pedia
      GET /api/show/list?all=true, que el server incluye shows con cualquier
      status (incluye DELETE); con varios shows borrados compartiendo titulo
      (dato real en dev: "Prueba Show api" x5, "Updated Show Title QA Test" x4,
      de un total de 5896 shows status=DELETE) el dropdown los mostraba todos.
      Fix: mediastream/sm2#8442 (issue) / mediastream/sm2#8443 (PR, sin mergear
      al momento de verificar, branch fix/issue-8442 -> staging). Verificado en
      vivo en dev (2026-07-03): el fix YA esta desplegado, el request real no
      lleva all=true y el selector no incluye ningun show borrado. MED-AC-22
      protege este comportamiento.
      El PR tambien agrega una guarda server-side (media/update.js): si al
      guardar se limpia show_info.showId y el show previo esta DELETE, restaura
      el link anterior en vez de dejarlo en null (evita desvincular medias en
      silencio ahora que los shows borrados no aparecen en el picker). No
      cubierto por MED-AC-22 (fuera del alcance del reporte); GAP conocido.

  # US-006 (thumbnails/preview) se movio al epic thumbnails-management (modulo thumbnails, PFX THM).
