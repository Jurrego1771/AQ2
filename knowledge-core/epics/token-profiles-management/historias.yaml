version: 1
epic: "token-profiles-management"
ultima_actualizacion: '2026-07-08'

# Este epic se actualizo a partir del analisis del PR sm2#8451 (Jurrego1771/AQ2).
# Cubre 2 historias:
#   1. AragonTV flow: token API restringido puede usar /api/category si su TokenProfile
#      incluye 'media.category' (PR sm2#8451, OPEN).
#   2. Token API restringido SIN media.category NO puede usar /api/category.
#
# Capa de contratos del recurso /api/category vive en knowledge-core/modules/category/

stories:
  - id: "US-035"
    titulo: "Acceso a /api/category por tokens API restringidos segun TokenProfile"
    rol: "cliente externo (ej. AragonTV) o admin de plataforma"
    meta: "Permitir que un API token con profile restringido use /api/category solo si su profile incluye 'media.category'"
    beneficio: "Habilitar integraciones externas (AragonTV) sobre platform actual 'https://platform.mediastre.am' sin compartir el token admin global"
    descripcion: |
      Como cliente externo de platform actual (AragonTV),
      quiero emitir un API token cuyo TokenProfile solo incluya el modulo 'media.category',
      para llamar a GET /api/category sin necesidad de pedir credenciales admin.

      Antes del PR sm2#8451 esto NO era posible: el enum de Mongoose en
      src/server/model/schemas/tokenProfile.js no aceptaba 'media.category', asi que
      cualquier profile que intentara guardarse con ese modulo fallaba la validacion.
    acceptance_criteria:
      - id: "CAT-AC-1"
        criterio: "Un API token cuyo TokenProfile incluye 'media.category' responde 200 al llamar GET /api/category"
      - id: "CAT-AC-2"
        criterio: "Un API token cuyo TokenProfile NO incluye 'media.category' responde 403 al llamar GET /api/category"
    prioridad: "medium"
    tipo: "feature"
    dependencias:
      - "PR sm2#8451 (feature/issue-8450, OPEN)"
      - "Setup admin: crear TokenProfile + emitir tokens persistentes (ver TOK-RISK-001)"

    notas: |
      Cobertura actual (sesion 2026-07-08):
      - Contrato del endpoint: tests/api/contract/category.api.contract.spec.js (CAT-TC-001..004) - verde.
      - AragonTV flow end-to-end: NO testeado desde esta cuenta. El bot QA no es super-admin; el setup requiere crear TokenProfile + emitir token con perfil `media.category` y reusarlo (ver TOK-RISK-001 en `knowledge-core/modules/token-profiles/tests.yaml` para el setup exacto). Decidido fuera de scope.
      - UI admin dropdown /admin/account - NO accesible con bot QA (Forbidden admin-only).
        El PR sm2#8451 agrega 'media.category' a @client/admin_accounts.coffee lines 15+;
        el coverage del dropdown queda como gap de UI (mismo problema que live-stream
        y otros modulos admin-only).
