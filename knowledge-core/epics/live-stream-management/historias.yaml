# Historias de Usuario - Epic Live Stream Management
# Solo intencion: US + AC. Los vinculos a tests/riesgos los declara el test
# (tests.yaml -> refs) y los calcula el build. Aqui NO hay reverse-links.
# AC ids unicos por modulo: LIVE-AC-N.
version: 1
epic: "Live Stream Management"
ultima_actualizacion: '2026-06-21'

stories:
  - id: "US-009"
    titulo: "Listar, filtrar por tipo y buscar live streams"
    rol: "administrador de contenido"
    meta: "encontrar rapidamente un evento por tipo (Video/Audio) o por nombre"
    beneficio: "operar la grilla de eventos en vivo sin recorrer manualmente cientos de items"
    descripcion: |
      Como administrador de contenido,
      quiero filtrar y buscar mis live streams desde el listado,
      para localizar y operar un evento sin paginar manualmente.

    acceptance_criteria:
      - id: "LIVE-AC-1"
        criterio: "El modulo Live carga el listado con un contador que refleja el total real (>0)"
      - id: "LIVE-AC-2"
        criterio: "Filtrar por tipo (Video/Audio) reduce el listado y marca el chip como activo"
      - id: "LIVE-AC-3"
        criterio: "Quitar el filtro de tipo restaura el listado completo"
      - id: "LIVE-AC-4"
        criterio: "Una busqueda sin coincidencias vacia el listado (0) y limpiarla lo restaura"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/live-stream"

    notas: |
      Verificado en vivo (dev): total=79, type=video->77, type=audio->2, query=Radio->1.
      El conteo se lee del contador `total-live-streams` porque la marca de card
      `live-container-<id>` existe solo en el layout grid (3 layouts coexisten).

  - id: "US-010"
    titulo: "Crear un live stream (Video o Audio) y operar sus endpoints de evento"
    rol: "administrador de contenido"
    meta: "dar de alta un evento en vivo con sus URLs, token y configuracion por tipo"
    beneficio: "publicar transmisiones de video o audio con un contrato de endpoints robusto"
    descripcion: |
      Como administrador de contenido,
      quiero crear un live stream de video o de audio y consultar sus recursos,
      para transmitir un evento y gestionarlo sin errores de plataforma.

    acceptance_criteria:
      - id: "LIVE-AC-5"
        criterio: "Los endpoints del evento tratan un id invalido (no-ObjectId) como NOT_FOUND (404), sin responder 500 ni filtrar errores de DB"
      - id: "LIVE-AC-6"
        criterio: "Guardar un evento nuevo genera id y slug (server-side) y deja origin/embed URLs con valores reales"
      - id: "LIVE-AC-7"
        criterio: "Guardar sin CDN zone pide confirmacion explicita antes de crear un signal inreproducible"
      - id: "LIVE-AC-8"
        criterio: "En tipo Audio se expone Icecast (stream URL + metadata mask) y se ocultan los controles de codec/bitrate de video"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/live-stream"
      - "CDN / encoding (publishing points)"

    notas: |
      LIVE-AC-6/7/8 estan verificados en vivo pero aun SIN test automatizado (GAP
      que reporta el build). LIVE-AC-5 esta cubierto por LIVE-TC-5/6 (verde) y por
      LIVE-TC-7 (prueba viva del bug AQ2#20, /recording 500).

  - id: "US-011"
    titulo: "Programar transmisiones (schedules) onetime y recurrentes de un live"
    rol: "administrador de contenido"
    meta: "agendar cuando un evento esta al aire, una vez o de forma recurrente"
    beneficio: "automatizar la grilla de emision sin intervencion manual por evento"
    descripcion: |
      Como administrador de contenido,
      quiero programar schedules (onetime o recurrentes) para un live-stream,
      para controlar cuando esta al aire sin solapamientos ni configuraciones invalidas.

    acceptance_criteria:
      - id: "LIVE-AC-9"
        criterio: "Crear un schedule onetime valido (futuro) persiste y es consultable por API con todos sus campos"
      - id: "LIVE-AC-10"
        criterio: "Crear un schedule recurrente valido persiste su recurrencia (dias, hora de inicio, duracion)"
      - id: "LIVE-AC-11"
        criterio: "Un schedule recurrente cuya ventana excede 1 ano es rechazado (400)"
      - id: "LIVE-AC-12"
        criterio: "Un schedule cuya fecha de fin esta en el pasado es rechazado"
      - id: "LIVE-AC-13"
        criterio: "Crear un schedule que solapa otro existente responde 400 (error del cliente), no 500"
      - id: "LIVE-AC-14"
        criterio: "Al actualizar un schedule, vaciar un texto o apagar un flag booleano persiste el nuevo valor"

    prioridad: "high"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/live-stream/schedule-job"

    notas: |
      Verificado en vivo (dev). LIVE-AC-9/10/11 en verde (LIVE-TC-8/9/10). LIVE-AC-12
      (AQ2#18), LIVE-AC-13 (AQ2#19) y LIVE-AC-14 (AQ2#23) estan en rojo: sus tests
      existen como pruebas vivas test.fail() (LIVE-TC-11/12/13). La cobertura UI de
      schedules esta bloqueada por falta de marcas sm (AQ2#24): solo el campo Title
      (scheduleTitle), save y delete tienen marca; tipo/fechas/horas/recurrencia/opciones
      no son direccionables -> cobertura solo por API.

  - id: "US-028"
    titulo: "Song metadata en el schedule solo para lives de audio"
    rol: "administrador de contenido"
    meta: "controlar el ignore de song metadata por schedule, solo donde aplica (lives de audio)"
    beneficio: "no exponer opciones sin sentido en video y controlar el metadata de canciones por franja en audio"
    descripcion: |
      Como administrador de contenido de un live de audio,
      quiero ver y configurar Inherit/Ignore Song Metadata en el schedule,
      para decidir por franja si se ignora el metadata de canciones; en video esas
      opciones no deben aparecer.

    acceptance_criteria:
      - id: "LIVE-AC-16"
        criterio: "En un schedule bajo un live de AUDIO se muestran los controles Inherit Ignore Song Metadata e Ignore Song Metadata"
      - id: "LIVE-AC-17"
        criterio: "En un schedule bajo un live de VIDEO esos controles no se renderizan"
      - id: "LIVE-AC-18"
        criterio: "Crear/actualizar un schedule persiste inherit_ignore_song_metadata e ignoreSongMetadata, incluidos los valores false (no se ignoran)"

    prioridad: "medium"
    tipo: "feature"
    dependencias:
      - "auth (sesion iniciada)"
      - "api/live-stream/schedule-job"
      - "un live de tipo audio (fixture audioLiveStream)"

    notas: |
      Origen: PR mediastream/sm2#8463 (Closes sm2#8462). Verificado en vivo (dev v7.0.70):
      ambos fixes desplegados -> tests VERDES (anti-regresion). El bloque se envuelve en
      `if @is_audio` (la ruta expone is_audio) y el save() del cliente solo envia los flags
      cuando los controles existen. A diferencia del bug #23 en description/is_featured, estos
      flags SI persisten el valor false (LIVE-TC-16/17/20). Los controles usan data-name (sin
      marca sm: -> AQ2#24); la UI se cubre por data-name como excepcion documentada. Nota: en
      exploracion se observo una lectura post-escritura inconsistente del schedule-job (GET
      devolvio campos vacios justo tras el POST), no reproducible de forma fiable -> no filado.
