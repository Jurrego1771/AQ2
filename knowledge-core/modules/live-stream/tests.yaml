  # ---- Cobertura nueva: endpoint /schedule/:sid (sm2#8496) ----
  # El handler en src/server/routes/api/live-stream/schedule/detail.js usaba
  # EventSchedule.find() (array) + if(schedule) -> [] era truthy y devolvia 200
  # con data:[]. El fix usa _.isEmpty(schedule) y devuelve 404 NOT_FOUND cuando
  # no hay resultados. Estos tests verifican el contrato post-fix:
  # sid valido vigente -> 200; sid inexistente o expirado -> 404.
  - id: "LIVE-TC-124"
    titulo: "GET /schedule/:sid con sid valido y vigente responde 200 con data[]"
    modulo: "live-stream"
    tipo: "integration"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["LIVE-AC-9"]
      mitigates: []
      story: "US-011"
      spec: "tests/api/integration/live-stream/live-stream-schedule-edge.integration.spec.js"
    # Happy path: proteccion contra regresion del fix sm2#8496.
    # SKIP tecnico (no bug de producto): el handler consulta el modelo
    # EventSchedule (no EventScheduleJob que crea createScheduleJob). El
    # scheduler materializa EventSchedules a partir de schedule-jobs y AQ2
    # no tiene forma de forzar la materializacion self-contained. Los casos
    # del fix (sid inexistente, sid expirado) los cubren TC-125 y TC-126.
  - id: "LIVE-TC-125"
