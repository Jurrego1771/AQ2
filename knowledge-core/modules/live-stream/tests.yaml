  # ---- Contratos HTTP (capa contract, blindaje contra drift de sm2) ----
  # BLOQUE ELIMINADO 2026-07-09: los 4 tests del contract spec (TC-21..24)
  # estaban mal numerados en el archivo fuente (usaban TC-CRT/GET/LST/404 en vez
  # de los IDs canonicos), por lo que no enlazaban con tests.yaml. Tras su
  # eliminacion, los IDs 21..24 quedan LIBRES para re-introducir el contrato
  # contra Zod si se reactiva. La cobertura equivalente queda en:
  #   - tests/api/smoke/live-stream/live-stream.api.spec.js (LIVE-TC-5..7, integracion del recurso)
  #   - tests/regression/live-stream-*.regression.spec.js (UI)
  # Sub-resources (schedule, thumb, logo, quizzes) tienen su propio spec.

# ---- Infra de provisioning: verificacion del naming convention (F1) ----
  # Protege la convencion [QA-AUTO][run=<6-hex>][w=<n>] habilitada por
  # src/utils/qa-name.js. Sin este test, una regression del helper (p.ej.
  # cambiar el formato) pasa desapercibida y rompe el sweep global (Capa 4).
  - id: "LIVE-TC-25"
    titulo: "Crear live usa la convencion [QA-AUTO][run=<runId>][w=<n>] y aparece tal cual en el listado"
    modulo: "live-stream"
    tipo: "integration"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: []
      mitigates: []
      story: "US-010"
      spec: "tests/api/smoke/live-stream/live-stream-naming.api.spec.js"
    # No valida un AC de producto: protege la infraestructura de provisioning
    # self-contained. Ver knowledge-core/cross-cutting/test-provisioning/overview.md
    # (Capa 0, naming).

  # ---- Infra de provisioning: safety net global (F4) ----
  # Simula un crash de worker (crea un live SIN register) y verifica que el
  # ResourceSweeper lo encuentra por nombre y lo borra. Protege la garantia
  # del teardown global: un fallo de per-test teardown no deja basura.
  - id: "LIVE-TC-26"
    titulo: "ResourceSweeper barre [QA-AUTO][run=<id>] huerfano (simula crash)"
    modulo: "live-stream"
    tipo: "integration"
    prioridad: "medium"
    # deferred 2026-07-14: el spec (sweepByRunId) borraba TODOS los recursos del
    # run actual -> inseguro bajo fullyParallel (arranca recursos a workers
    # hermanos) y timeout 30s. Pasa aislado (7.5s). Rehacer con marcador unico
    # por test, no el runId compartido. Spec eliminado.
    estado: "deferred"
    refs:
      validates: []
      mitigates: []
      story: "US-010"
      spec: ""
    # No valida un AC de producto: protege la infraestructura de provisioning
    # self-contained. Ver knowledge-core/cross-cutting/test-provisioning/overview.md
    # (Capa 4, safety net).

  # ---- Infra de provisioning: rate-limit dev (F7) ----
  # Unit del Semaphore: protege la concurrencia que AQ2 mete contra el dev
  # compartido (mitiga 502 Bad Gateway intermitentes). Activar con
