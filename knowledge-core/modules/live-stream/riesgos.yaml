# Riesgos - Modulo Live Stream. Poblado desde exploracion en vivo (dev) + codigo sm2.
# Defectos = issues GitHub (Jurrego1771/AQ2#N). NO se escribe mitigado_por_test (derivado).
version: 1
modulo: "live-stream"
ultima_actualizacion: '2026-07-09'  # +LIVE-RISK-18 (patron latente find()+truthy en 3 endpoints hermanos del fix sm2#8496)

riesgos:
  - id: "LIVE-RISK-1"
    severidad: "medium"
    probabilidad: "high"
    titulo: "GET /:id/recording responde 500 y filtra error de DB ante id no-ObjectId"
    descripcion: >
      El endpoint /api/live-stream/:id/recording no valida que :id sea un ObjectId.
      Con un id no-ObjectId (el literal "new", que el form de creacion usa como
      segmento de ruta) Mongoose lanza un CastError al castear a ObjectId en el path
      event; el handler cae en su rama if(err) y responde HTTP 500 con el objeto err
      de Mongoose serializado (DB_ERROR). Se dispara automaticamente en cada carga de
      /live-stream/new (la seccion Recording pide /api/live-stream/new/recording).
    detonador:
      - "Abrir /live-stream/new (o ?type=audio) y observar GET /api/live-stream/new/recording"
      - "Llamar al endpoint con cualquier id que no sea un ObjectId valido"
    mitigacion: >
      Validar :id como ObjectId antes de consultar y devolver 404 NOT_FOUND
      (consistente con /:id y /:id/schedule-job) o 400; no serializar el objeto err
      de Mongoose en la respuesta (information disclosure, CWE-209).
    archivos_afectados:
      - "src/server/routes/api/live-stream/recording/index.js"
    defectos_relacionados:
      - "Jurrego1771/AQ2#20"
    prioridad_prueba: "MUST"
    nota_industria: >
      OWASP Improper Error Handling / Information Exposure (CWE-209). Un error de
      entrada del usuario no debe tratarse como 5xx ni exponer internals de la DB.

  - id: "LIVE-RISK-2"
    severidad: "low"
    probabilidad: "high"
    titulo: "El form de creacion muestra 'undefined'/'new' en Origin URL y Embed pre-save"
    descripcion: >
      En /live-stream/new, antes del primer guardado, Origin URL muestra
      http://devorigin-us.cdn.mdstrm.com/undefined/live-stream/undefined/media.m3u8
      y Embed muestra .../live-stream/new (el segmento de ruta como id). Tras guardar
      ambos toman valores reales (customer-hash + id), por lo que es cosmetico del
      estado pre-save, pero puede inducir a copiar una URL invalida.
    detonador:
      - "Abrir /live-stream/new y mirar Stream URLs -> Origin URL y la seccion Embed"
    mitigacion: >
      Mantener esos campos vacios/deshabilitados/ocultos mientras el evento no exista.
    archivos_afectados:
      - "src/client/live_stream.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#21"
    prioridad_prueba: "COULD"
    nota_industria: >
      Nielsen #2 (correspondencia con el mundo real) y #5 (prevencion de errores).

  - id: "LIVE-RISK-3"
    severidad: "low"
    probabilidad: "medium"
    titulo: "Filtros del listado comparten marca sm (no direccionables individualmente)"
    descripcion: >
      En /live-stream, los chips Video/Audio/Favorites comparten sm="top-filter" (3
      nodos) y Published/Not Published/Online/Offline comparten sm="top-filter-dropdown"
      (4 nodos). No son seleccionables por sm unico, obligando a los tests a usar
      indice/orden (fragil ante reordenamiento o i18n). Mismo smell que total-medias x2.
    detonador:
      - "Automatizar la seleccion de un filtro especifico del listado por marca sm"
    mitigacion: >
      Asignar marcas sm unicas por control (filter-video, filter-audio, filter-favorites,
      filter-published, etc.).
    archivos_afectados:
      - "src/client/live_streams.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#22"
    prioridad_prueba: "COULD"
    nota_industria: >
      Testabilidad / mantenibilidad de selectores (contrato QA del proyecto: solo sm:).

  - id: "LIVE-RISK-4"
    severidad: "low"
    probabilidad: "high"
    titulo: "Renombrar un evento regenera su slug y rompe enlaces compartidos"
    descripcion: >
      Editar el nombre de un live-stream regenera su slug desde el nombre en cada
      guardado, cambiando la URL publica. No hay aviso ni forma de fijar el slug
      (event-slug es readonly). Un evento publicado/embebido por slug queda con
      enlaces rotos tras un simple rename.
    detonador:
      - "Editar el nombre de un evento existente y guardar"
    mitigacion: >
      No regenerar el slug en updates (solo en alta) o permitir fijarlo; avisar del
      cambio de URL.
    archivos_afectados:
      - "src/client/live_stream.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#17"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Estabilidad de URLs / SEO: el slug publico es una clave que terceros referencian.

  - id: "LIVE-RISK-5"
    severidad: "medium"
    probabilidad: "medium"
    titulo: "Schedule acepta fecha de fin en el pasado (falta validacion server-side)"
    descripcion: >
      POST /api/live-stream/:id/schedule-job con date_end en el pasado responde 200 y
      crea el schedule. El cliente mapea INVALID_DATE_ERROR_SCHEDULE_END_PAST -> mensaje,
      pero el server nunca lo devuelve (codigo muerto en el cliente; validacion ausente
      en backend).
    detonador:
      - "Crear un schedule onetime con date_end anterior a la fecha actual"
    mitigacion: >
      Validar en el backend que date_end > ahora y devolver el error correspondiente.
    archivos_afectados:
      - "src/server/routes/api/live-stream/schedule-job"
    defectos_relacionados:
      - "Jurrego1771/AQ2#18"
    prioridad_prueba: "MUST"
    nota_industria: >
      Validacion de entrada en el server (no confiar en el cliente).

  - id: "LIVE-RISK-6"
    severidad: "low"
    probabilidad: "medium"
    titulo: "Schedule solapado devuelve 500 en vez de 400 (CustomError perdido en transaccion)"
    descripcion: >
      Crear un schedule que solapa fechas con otro existente responde HTTP 500 con
      INVALID_DATE_ERROR_OVERLAPPED_DATES, cuando es un error de validacion del usuario
      y deberia ser 400. Tratar un error de usuario como 5xx infla las metricas de error
      y puede disparar alertas falsas.
    detonador:
      - "Crear dos schedules onetime en la misma ventana de fechas"
    mitigacion: >
      Preservar el status del CustomError dentro de la transaccion y responder 400.
    archivos_afectados:
      - "src/server/routes/api/live-stream/schedule-job"
    defectos_relacionados:
      - "Jurrego1771/AQ2#19"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Semantica HTTP correcta: 4xx para errores del cliente, 5xx para fallos del servidor.

  - id: "LIVE-RISK-7"
    severidad: "medium"
    probabilidad: "high"
    titulo: "Update de schedule ignora valores vacios en campos user-editable: no se puede limpiar texto"
    descripcion: >
      Al actualizar un schedule (POST /schedule-job/:id), el server solo aplica un campo
      cuando el valor entrante es truthy (guardas if(body.X) en updateSchedule,
      src/server/routes/api/live-stream/schedule-job/utils/index.js:460-484). En
      consecuencia no se puede vaciar la **description** del schedule (queda el texto
      previo) ni (subjetivo, requiere confirmacion) desactivar not_sellable / is_blackout
      / is_auto_publish / for_recording. El update responde 200, dando falsa sensacion
      de guardado. Verificado en vivo: description:'' se ignora tras releer.

      **IMPORTANTE — campos excluidos del bug (diseño, no defecto)**:
      is_featured es un valor unidireccional fastchannel -> schedule (no user-editable
      desde el form de schedule). Que el server lo ignore en update del schedule es
      **contrato correcto**, no bug. Aunque comparta el mismo guard `if(body.is_featured)`
      en utils/index.js:473, ese campo tiene semantica distinta: pertenece al motor de
      fastchannel, no al form de edicion.
      Otros campos como for_recording, monetizable, inherit_geo_restrictions,
      inherit_custom_attributes, delayedContent, live_restreaming requieren analisis
      caso por caso (cuales son user-editable desde schedule vs fed desde fastchannel)
      antes de incluirlos como 'bug #23'.

      En create la description si maneja vacio (verificado).
    detonador:
      - "Editar un schedule existente y vaciar el campo description, guardar"
      - "Desmarcar checkboxes de monetizacion / publicacion automatica y guardar (a verificar caso por caso)"
    mitigacion: >
      En updateSchedule distinguir 'clave presente con valor vacio/false' de 'clave ausente':
      aplicar description siempre que venga la clave (permitiendo ''), y los booleanos
      user-editable por presencia (permitiendo false); o normalizar el body del form
      (checkbox desmarcado -> false). No tocar campos fastchannel (is_featured).
    archivos_afectados:
      - "src/server/routes/api/live-stream/schedule-job/utils/index.js"
    defectos_relacionados:
      - "Jurrego1771/AQ2#23"
    prioridad_prueba: "MUST"
    nota_industria: >
      Semantica de update parcial (PUT/PATCH): un valor explicito user-editable no debe
      descartarse. Nielsen #3 (control y libertad: poder deshacer). No aplicar el fix
      a campos con semantica unidireccional desde otra capa (fastchannel).

  - id: "LIVE-RISK-8"
    severidad: "low"
    probabilidad: "high"
    titulo: "El form de schedule carece de marcas sm: cobertura UI no automatizable"
    descripcion: >
      El formulario New/Edit Schedule solo expone marcas sm en Title (scheduleTitle), save,
      delete y main-information. Tipo onetime/recurrent, Start/End Date, selects de hora/minuto,
      dias de recurrencia, duracion y las opciones (Featured, Blackout, Not Sellable, etc.) no
      tienen marca sm. Bajo la regla 'solo sm:' del proyecto, la cobertura UI de schedules
      (crear onetime/recurrente, validar que la UI impide solapes, persistencia llenado/vaciado)
      no es automatizable; queda solo cobertura por API.
    detonador:
      - "Intentar automatizar el form de schedule por selector sm"
    mitigacion: >
      Agregar marcas sm semanticas por control: schedule-type-onetime/recurrent,
      schedule-date-start/end, schedule-start-hour, schedule-recurrency-days,
      schedule-duration-hours, schedule-opt-featured/blackout/not-sellable, etc.
    archivos_afectados:
      - "src/client/live_stream.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#24"
    prioridad_prueba: "COULD"
    nota_industria: >
      Testabilidad / contrato QA del proyecto (selectores estables sm:).

  - id: "LIVE-RISK-9"
    severidad: "high"
    probabilidad: "medium"
    titulo: "Guardar el detalle puede pisar en silencio un Custom Attribute cambiado por otra sesion"
    descripcion: >
      Riesgo COMPARTIDO, ver definicion completa en
      cross-cutting/custom-attributes/riesgos.yaml -> ATTR-RISK-001 (no duplicar aqui).
      Confirmado en codigo que live_stream.coffee integra CustomAttributes y llama
      @customAttribute.save() de forma incondicional en cada Save Changes (linea 1920-1921),
      reenviando el snapshot completo del DOM. Sin control de concurrencia server-side,
      esto puede pisar un custom attribute cambiado por otra sesion mientras la pagina
      actual estaba abierta. Hipotesis de causa raiz del incidente TV Azteca (campo
      "Show in OTT", no confirmado como custom attribute en vivo).
    detonador:
      - "Ver ATTR-RISK-001"
    mitigacion: >
      Ver ATTR-RISK-001. Mitigacion parcial via notificacion websocket
      (mediastream/sm2#8317), no bloquea el guardado.
    archivos_afectados:
      - "src/client/live_stream.coffee"
      - "cross-cutting/custom-attributes/ (mecanismo compartido)"
    defectos_relacionados:
      - "mediastream/sm2#8317 (mitigacion parcial, no fix)"
    prioridad_prueba: "MUST"
    nota_industria: >
      Ver ATTR-RISK-001 (patron "lost update" por ausencia de optimistic locking).

  - id: "LIVE-RISK-10"
    severidad: "medium"
    probabilidad: "low"
    titulo: "addNewEpisode podria mutar un episodio distinto al pretendido si episodeId es invalido"
    descripcion: >
      Hallado leyendo model/schemas/event_schedule.js (mediastream/sm2#8423,
      linea 406). addNewEpisode(doc) se dispara en el hook postCommit('save')
      de EventSchedule cuando show_info.showId + seasonId existen, no es
      fast_channel_schedule_id, no esta recording/recorded, y el
      EventScheduleJob asociado es type:'onetime'. En la rama default del
      switch (cualquier show_info.episodeId que no sea el literal 'new'),
      el codigo pre-fix llegaba a
      `SeasonEpisode.findOne({ account: doc.account, _id: doc.show_info.episodeId })`
      con episodeId potencialmente undefined/null/invalido. Mongoose
      descarta las claves con valor undefined de una condicion de query en
      vez de fallar el cast -eso reduce el filtro a
      `findOne({ account: doc.account })`, que puede matchear CUALQUIER
      episodio de esa cuenta (el primero que devuelva Mongo) y mutarlo
      (content.push, first_emision, .save()). El fix agrega
      `if (!mongoose.isValidObjectId(doc.show_info?.episodeId)) return`
      antes de llegar a ese find, cerrando el hueco.
      El PR que lo introduce (sm2#8423) trae un code-review embebido de
      otra IA que califica este cambio como "funcionalmente neutro /
      hardening de costo cero" -analisis incompleto: solo verifica que
      show_info existe (garantizado por el if de la linea 377), no que
      episodeId sea un ObjectId valido, que es lo que el guard nuevo
      realmente protege-.
    detonador:
      - "Guardar un EventSchedule con show_info.showId+seasonId validos, show_info.episodeId ausente/invalido (no 'new'), EventScheduleJob type:'onetime', y al menos otro episodio existente en la misma cuenta"
    mitigacion: >
      Ya aplicada en sm2#8423 (guard de isValidObjectId antes del find).
      Verificacion en vivo NO realizada: Show/Season/Episode en sm2 se
      gestionan por gRPC interno (grpc/services/seasonEpisode.js,
      showSeason.js), sin ruta /api/show|season|episode de creacion
      -confirmado leyendo app.js: el unico endpoint /api/show es
      GET /api/show/list-. No hay forma de armar el fixture (Show -> Season
      -> Episodio) con el harness HTTP de AQ2 sin un cliente gRPC.
    archivos_afectados:
      - "src/server/model/schemas/event_schedule.js"
    defectos_relacionados:
      - "mediastream/sm2#8417"
      - "mediastream/sm2#8423"
    prioridad_prueba: "COULD"
    nota_industria: >
      Un filtro de query con un campo undefined no es "sin filtro en ese
      campo" en la intencion del desarrollador, pero Mongoose lo trata asi
      -mismatch entre lo esperado y el comportamiento real de la libreria-.

  - id: "LIVE-RISK-11"
    severidad: "low"
    probabilidad: "medium"
    titulo: "Regresion del render condicional de song metadata en el schedule (audio vs video)"
    descripcion: >
      El bloque de song metadata (Inherit/Ignore Song Metadata) del form de schedule
      debe renderizarse SOLO cuando el live padre es de tipo audio (PR sm2#8463: `if @is_audio`
      en la vista + is_audio expuesto por la ruta + el cliente solo envia los flags cuando los
      controles existen). Riesgo de regresion: que los controles reaparezcan en video (opciones
      sin sentido, ruido de UX) o que los flags dejen de persistir el valor false (patron falsy
      hermano de #23). Verificado en vivo (dev v7.0.70): audio muestra ambos controles, video
      ninguno, y el contrato persiste inherit_ignore_song_metadata/ignoreSongMetadata incluidos
      los false.
    detonador:
      - "Abrir/crear un schedule bajo un live de audio vs video"
      - "Alternar los flags, guardar y recargar (persistencia, incl. uncheck -> false)"
    mitigacion: >
      Render condicional por tipo de live y persistencia de los flags. Cubierto por
      LIVE-TC-16/17 (API) y LIVE-TC-18/19/20 (UI). Los controles usan data-name (sin marca sm:,
      AQ2#24); la UI se cubre por data-name como excepcion documentada.
    archivos_afectados:
      - "src/pages/schedule.page.js"
      - "src/api/live-stream.client.js"
    defectos_relacionados:
      - "mediastream/sm2#8462"
      - "mediastream/sm2#8463"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Nielsen #8 (diseno minimalista): no mostrar controles que no aplican al contexto
      (video). La persistencia de valores falsy es un patron de bug recurrente en la
      plataforma (ver #23) que conviene proteger explicitamente.

  - id: "LIVE-RISK-12"
    severidad: "low"
    probabilidad: "high"
    titulo: "Schedule-job acepta valores fuera de rango (date_start_minute, date_end_minute)"
    descripcion: >
      El server NO valida que date_start_minute y date_end_minute esten en el rango
      valido (0-59). Verificado en vivo (dev v7.0.72, runId=09916c, LIVE-TC-67): POST con
      date_start_minute=99 responde 200 y persiste el schedule con el valor invalido.
      Impacto: data integrity (horarios imposibles), consumidores que asumen rango valido
      se rompen silenciosamente. Misma familia de bug que #18/#19 (validacion ausente
      en backend).
    detonador:
      - "POST /api/live-stream/:id/schedule-job/ con date_start_minute o date_end_minute fuera de 0-59"
    mitigacion: >
      Validar el rango en el server (mismo lugar que la validacion de hour, si existe)
      o en el schema Mongoose. Reusar el patron INVALID_DATE_ERROR_* de los otros errores
      de schedule. Tambien considerar coercion silenciosa (mod 60) como fallback defensivo.
    archivos_afectados:
      - "src/server/routes/api/live-stream/schedule-job"
    defectos_relacionados:
      - "Jurrego1771/AQ2#48"
    prioridad_prueba: "MUST"
    nota_industria: >
      Validacion de entrada en el server (no confiar en el cliente). El form de
      schedule usa selects que limitan a 0-59, pero el endpoint API no - cualquier
      consumidor externo (clientes custom, scripts, integraciones) puede meter
      valores invalidos.

  # ---- Riesgos nuevos: sesion 2026-07-09 ----
  # ID renumerado desde LIVE-RISK-13 a LIVE-RISK-17 (2026-07-09):
  # el ID 13 ya estaba referenciado en el spec de ingest (deprecated) como
  # "entry_points.primary vacio al crear por API" (issue AQ2#49, CERRADO).
  # Para mantener trazabilidad historica sin colision, este riesgo pasa a -17.
  - id: "LIVE-RISK-17"
    severidad: "medium"
    probabilidad: "high"
    titulo: "TypeError en consola del detalle: addParamToURL de live_dynamic_preview.js"
    descripcion: >
      Cada carga de /live-stream/:id (cualquier live, recien creado o preexistente)
      dispara Uncaught TypeError en consola desde live_dynamic_preview.js. La traza
      indica null.split en addParamToURL(...:3321), llamada desde process_load_preview
      y reload_previews (live_streams.js:8283). Reproducible en al menos 2 cuentas
      distintas del dev: el mio recien creado (entry_points.primary=[]) y 'Full RTMP'
      (entry_points.primary con 1 entry). Por tanto NO es especifico de un live sin
      ingest. El bug es general y rompe la calidad de la consola, ocultando errores
      reales del modulo.
    detonador:
      - "GET /live-stream/<id> en cualquier live del entorno dev"
    mitigacion: >
      Null-check antes de .split en addParamToURL; o cortocircuitar la llamada cuando
      la URL del preview es null (caso 'sin ingest' / 'live recien creado'). Para el
      fix real se requiere source maps (stack apunta a linea 3321 de bundle minificado).
    archivos_afectados:
      - "src/client/live_dynamic_preview.js (coffee compilado, stack: live_dynamic_preview.js:3321 / live_streams.js:8283)"
    defectos_relacionados:
      - "Jurrego1771/AQ2#50"
    prioridad_prueba: "MUST"
    nota_industria: >
      Fiabilidad/consola (heuristica del skill qa-module). Enmascarar errores 1ra
      linea (no manejar null) lleva a UX 'misteriosa' - el feature parece OK pero
      queda stack en consola.

  # LIVE-RISK-14/15/16 ya existen debajo. LIVE-RISK-13 queda LIBRE (no se usa;
  # ver cabecera de LIVE-RISK-17).

  - id: "LIVE-RISK-14"
    severidad: "low"
    probabilidad: "high"
    titulo: "El front pide /api/live-stream/:id/records en cada carga, que siempre devuelve 404"
    descripcion: >
      El detalle hace GET /api/live-stream/&lt;id&gt;/records?limit=5 en cada carga. El
      endpoint no existe documentado y responde {status:'ERROR', data:'NOT_FOUND'}
      (HTTP 404) consistentemente. Probable bug de contrato: el back expone
      /api/live-stream/:id/recording (que devuelve 200), y /records es o un leftover o
      un typo. No afecta funcionalidad visible (la UI no pinta nada a partir del
      resultado), pero delata drift entre el front y el back que en un futuro podria
      tirar un .catch silencioso a una ruta que SI exista.
    detonador:
      - "GET /api/live-stream/<id>/records?limit=5 desde el detalle"
    mitigacion: >
      Front: dejar de pedir /records y usar /recording (o eliminarlo si no se usa).
      Back: si la intencion era exponer /records (variante de /recording), crearlo y
      documentarlo; si no, eliminar el endpoint faltante.
    archivos_afectados:
      - "src/client/live_stream.coffee (handler que pide /records)"
      - "src/server/routes/api/live-stream/recording/ (probable rename histórico)"
    defectos_relacionados:
      - "Jurrego1771/AQ2#51"
    prioridad_prueba: "COULD"
    nota_industria: >
      Contrato cliente-servidor: un 404 persistente entre back y front suele preceder
      a un break silencioso cuando el back se modifica.

  - id: "LIVE-RISK-15"
    severidad: "low"
    probabilidad: "high"
    titulo: "AI Live Transcription sin marcas sm: (cobertura UI bloqueada)"
    descripcion: >
      La seccion 'AI Live Transcription' del detalle (h3) NO expone ningun sm= ni
      data-name= en sus controles: ni el toggle Enabled (ON/OFF) ni el 'Select a
      Language' (con 100+ idiomas) son direccionables. La API subyacente
      (liveTranscription.enabled + language) SI persiste al guardar, pero la cobertura
      UI de la seccion es 100% no automatizable bajo la regla 'solo sm:' del
      proyecto. Verificado en dev v7.0.75 (runId=274d02). Mismo patron que
      Schedules (LIVE-RISK-8 / AQ2#24) - deuda de testabilidad.
    detonador:
      - "Intentar automatizar un assert sobre el toggle o el select de AI Live Transcription"
    mitigacion: >
      Agregar marcas sm: semanticas en live_stream.coffee: ai-transcription-enabled,
      ai-transcription-language (o equivalentes).
    archivos_afectados:
      - "src/client/live_stream.coffee (render del bloque AI Live Transcription)"
    defectos_relacionados:
      - "Jurrego1771/AQ2#52"
    prioridad_prueba: "MUST"
    nota_industria: >
      Testabilidad / contrato QA. La ausencia de marcadores rompe el principio de
      'selector estable' que QA usa para aserciones robustas.

  - id: "LIVE-RISK-16"
    severidad: "low"
    probabilidad: "high"
    titulo: "Playout y Next Settings sin marcas sm: (toggle Enable + 5 controles no automatizables)"
    descripcion: >
      En el detalle del live, las secciones Playout y Next Settings no exponen
      marcas sm: ni data-name= en sus controles:
      - Playout: toggle Enable + select (Prueba, ...).
      - Next Settings: Always On toggle + Alternative Label input + Disable Chat
        toggle + Alternative Canonical URL input + Redirect To input.
      La API persiste los valores correctamente (next_settings.always_on, etc.),
      pero la cobertura UI completa no es automatizable. Mismo patron que
      LIVE-RISK-15 (AI Live Transcription) y LIVE-RISK-8 (Schedules).
    detonador:
      - "Intentar automatizar aserciones sobre Playout.Enable / Next Settings.Disable Chat / etc."
    mitigacion: >
      Agregar sm="playout-enabled", sm="playout-asset", sm="next-always-on",
      sm="next-disable-chat", sm="next-canonical-url", sm="next-alternative-label",
      sm="next-redirect" en live_stream.coffee.
    archivos_afectados:
      - "src/client/live_stream.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#53"
      - "Jurrego1771/AQ2#54"
    prioridad_prueba: "MUST"
    nota_industria: >
      Testabilidad / contrato QA. Patrón recurrente: secciones con estado persistente
      en la API pero sin selectores estables → cobertura UI bloqueada.

  # ---- Riesgo nuevo: patron latente find()+truthy en endpoints hermanos ----
  # El fix sm2#8496 corrige el caso /schedule/:sid. El autor explicita en la
  # seccion 'Consideraciones' del PR que los mismos 3 endpoints tienen el
  # MISMO patron latente: una query que devuelve array (.find) seguida de
  # una verificacion truthy (if (schedules)). Un array vacio es truthy -> 200
  # con data:[] en lugar de 404. Sin un fix explicito, esos 3 endpoints siguen
  # reportando '200 OK con lista vacia' cuando el recurso no existe, igual que
  # el bug original. schedule-job/detail.js NO aplica (ya usa findOne -> null).
  - id: "LIVE-RISK-18"
    severidad: "medium"
    probabilidad: "high"
    titulo: "Patron latente find()+truthy en 3 endpoints hermanos del fix sm2#8496"
    descripcion: >
      El handler de GET /api/live-stream/:id/schedule/:sid (sm2#8496) usaba
      EventSchedule.find(...) seguido de `if (schedule)`. Un array vacio es
      truthy en JS, asi que el handler devolvia 200 OK con data:[] en vez
      de 404 NOT_FOUND cuando el sid no existia o el schedule estaba en el
      pasado. El fix sm2#8496 corrige SOLO este endpoint. El autor lista en
      la seccion 'Consideraciones' del PR otros 3 endpoints con el mismo
      patron latente:
        - src/server/routes/api/live-stream/schedule/index.js (lineas 41 y 139)
        - src/server/routes/api/live-stream/schedule-job/getScheduleJobs.js:107
        - src/server/routes/api/live-stream/routes-embed/api/live-stream/schedule.js:27
      Estos 3 endpoints (fuera del scope de sm2#8496) probablemente replican
      el mismo bug silencioso: un 'GET listado' que no encuentra nada
      devuelve 200 con data:[], lo que enmascara errores aguas abajo y viola
      la semantica REST. El cliente (coffee) que llama a estos endpoints
      puede estar recibiendo 'OK con lista vacia' y mostrando 'no hay
      schedules' cuando deberia mostrar 'endpoint roto / recurso no existe'.
    detonador:
      - "GET a cualquiera de los 3 endpoints listados con un filtro que no matchea"
      - "En el caso de schedule/index.js: GET /schedule/ sin :sid (listado) con filtros que excluyen todo"
      - "En el caso de schedule-job/getScheduleJobs.js: GET /schedule-job/ con filtros sin match (similar al actual TC-62 que ya tolera 200/404)"
      - "En el caso de routes-embed/.../schedule.js: la ruta embebida con filtro sin match"
    mitigacion: >
      Mismo patron que sm2#8496: cambiar `if (X)` por `if (!_.isEmpty(X))`
      en cada uno de los 3 handlers. Idealmente refactor a findOne() cuando
      se espera un unico documento (imposible por contrato: el server expone
      listas), o normalizar la respuesta para que `data` sea `null` en lugar
      de `[]` cuando no hay resultados. Tambien considerar agregar
      validacion de tipo: `Array.isArray(X) && X.length > 0`.
    verificado_en_dev: >
      2026-07-09 — TC-62 (GET /schedule-job/ con live id inexistente) YA
      respondia 404 estricto, no 200 con data:[]. Es decir: el patron
      latente del LIST endpoint con un id inexistente NO se manifiesta
      en este escenario concreto (posiblemente Mongoose falla antes del
      truthy check, o el handler tiene otra guarda). El code smell sigue
      siendo valido para el caso 'live valido + filtro que no matchea',
      no verificado. TC-71 (DETAIL /schedule-job/:sid con sid inexistente)
      tambien responde 404 correcto — el detail ya usa otra logica.
    archivos_afectados:
      - "src/server/routes/api/live-stream/schedule/index.js (lineas 41 y 139)"
      - "src/server/routes/api/live-stream/schedule-job/getScheduleJobs.js (linea 107)"
      - "src/server/routes/api/live-stream/routes-embed/api/live-stream/schedule.js (linea 27)"
    defectos_relacionados:
      - "mediastream/sm2#8496 (fix del endpoint /schedule/:sid; el patron sigue latente en los 3 hermanos)"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Smell recurrente en codigo JS que mezcla .find() (array) con .findOne()
      (objeto|undefined) sin disciplina. La leccion del fix sm2#8496 es
      replicable: la ausencia de _.isEmpty() en validaciones de 'recurso
      encontrado' es una clase de bug detectable por linter (regla:
      'never use bare truthy check on array-returning query').
