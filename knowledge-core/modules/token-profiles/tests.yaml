# Tests - Modulo Token Profiles. Definicion (sin estado de ejecucion: eso es derivado).
# refs = FUENTE UNICA de los vinculos. El spec lleva en su titulo solo el id
# de correlacion @TOK-TC-N (+ la capa @api).
version: 1
modulo: "token-profiles"
ultima_actualizacion: '2026-07-08'

# Sin tests implementables todavia por el bot QA: se escribio y elimino un intento
# (ver TOK-RISK-001): un token creado por la cuenta QA sin permisos especiales
# NUNCA tiene TokenProfile asignado (la UI esconde ese campo salvo is_admin), por
# lo que cualquier request con ese token nunca ejercita el codigo de module-access.js
# que el PR sm2#8451 cambia -> un test asi da un falso positivo, no cobertura
# real. Bloqueado hasta conseguir el setup de TOK-RISK-001 (dos TokenProfile
# ids + modulo api_tokens habilitado en la cuenta).
#
# PR sm2#8451 (analisis Jurrego1771/AQ2 reports/pr-context/2026-07-08-pr-8451):
# - Estado del PR a 2026-07-08: OPEN, branch feature/issue-8450 -> staging, sin mergear.
# - Cuando el acceso este disponible, ejecutar:
#   TOK-TC-001 (valida CAT-AC-1): token con profile=TOKEN_PROFILE_ID_WITH_CATEGORY
#     -> GET /api/category responde 200.
#   TOK-TC-002 (valida CAT-AC-2): token con profile=TOKEN_PROFILE_ID_WITHOUT_CATEGORY
#     -> GET /api/category responde 403.

tests:
  # ---- AragonTV flow (PR sm2#8451) ----
  # Skipeados por env vars faltantes. Ver setup en TOK-RISK-001.
  - id: "TOK-TC-001"
    titulo: "GET /api/category con token CON media.category responde 200"
    modulo: "token-profiles"
    tipo: "contract"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-1"]
      mitigates: ["TOK-RISK-2"]
      story: "US-035"
      spec: "tests/api/token-profile.gate.spec.js"
    # Cubre el camino feliz del PR sm2#8451: AragonTV puede listar categorias
    # con un token restringido al modulo 'media.category'.

  - id: "TOK-TC-002"
    titulo: "GET /api/category con token SIN media.category responde 403"
    modulo: "token-profiles"
    tipo: "contract"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-2"]
      mitigates: ["TOK-RISK-2"]
      story: "US-035"
      spec: "tests/api/token-profile.gate.spec.js"
    # Cubre el camino negativo: un token restringido a otros modulos no debe
    # poder listar categorias aunque pertenezca al account.

  - id: "TOK-TC-003"
    titulo: "GET /api/category/:id con token restringido respeta el modulo"
    modulo: "token-profiles"
    tipo: "contract"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-1", "CAT-AC-2"]
      mitigates: ["TOK-RISK-1"]
      story: "US-035"
      spec: "tests/api/token-profile.gate.spec.js"
    # Cubre el detalle individual vs listado.

  - id: "TOK-TC-004"
    titulo: "Token invalido devuelve 403 INVALID_TOKEN sin caer en 500"
    modulo: "token-profiles"
    tipo: "contract"
    prioridad: "low"
    estado: "active"
    refs:
      validates: ["CAT-AC-2"]
      mitigates: ["TOK-RISK-3"]
      story: "US-035"
      spec: "tests/api/token-profile.gate.spec.js"
    # Garantiza que el server NUNCA devuelve 500 ante x-api-token malformado.
    # Critico para un AragonTV que construye el header dinamicamente.

  # ---- Cobertura del contrato del recurso /api/category ----
  # Vive en knowledge-core/modules/category/tests.yaml (CAT-TC-001..004). Se
  # referencian aca porque son el proxy observable del fix sm2#8451 que
  # interesa al flow AragonTV.