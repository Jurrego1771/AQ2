# Tests - Modulo Playlist. Definicion (sin estado de ejecucion: eso es derivado).
# refs = FUENTE UNICA de los vinculos. El spec lleva en su titulo solo el id de
# correlacion @PLST-TC-N (+ la capa @api/@regression).
version: 1
modulo: "playlist"
ultima_actualizacion: '2026-07-06'

tests:
