  # ---- Contratos HTTP (capa contract, blindaje contra drift de sm2) ----
  # Migrado de api_test_flow/tests/api/contract/playlist/playlist.contract.spec.js.
  # Cubre POST/GET/list + ?medias=true con schema Zod (src/schemas/playlist.schema.js).
  - id: "PLST-TC-12"
    titulo: "POST /api/playlist devuelve Create Response valido contra Zod"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"

  - id: "PLST-TC-13"
    titulo: "GET /api/playlist/:id devuelve Get Response valido contra Zod"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"

  - id: "PLST-TC-14"
    titulo: "GET /api/playlist (list) devuelve List Response valido contra Zod"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-2"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"

  - id: "PLST-TC-15"
    titulo: "GET /api/playlist/:id?medias=true responde 200 con envelope jsonp valido"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # Diferencia con el old repo: en esta version de sm2 ?medias=true devuelve la
    # playlist completa + rules, NO un array de medias. Conservamos el spec para
    # detectar drift en el envelope (status/data) sin atar a un shape interno.

  # ---- PR sm2#8076: campo uses_reels + query param ----
  # Migrado de la sesion de analisis del PR sm2#8076 (Jurrego1771/AQ2 reports/
  # pr-context/2026-07-08-pr-8076-uses-reels.json). Cubre el shape del campo
  # `uses_reels` y el query filter ?uses_reels=true|false (este ultimo usa
  # $ne:true para backward-compat con playlists legacy). PLST-TC-021 es
  # RED-HASTA-FIX del bug-falsy de la saga #847 - pasa a verde cuando el PR
  # se mergee a dev.
  - id: "PLST-TC-016"
    titulo: "POST /api/playlist con uses_reels=true persiste el flag"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # Verificacion doble: POST responde con el flag, GET posterior lo confirma.
    # Assert estricto: si el server NO acepta uses_reels en el body, el spec
    # salta con PLST-SKIP (PR no mergeado). Si el server acepta pero NO
    # persiste, es bug del handler.

  - id: "PLST-TC-017"
    titulo: "POST /api/playlist SIN uses_reels -> default false del schema"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # Default del schema Mongoose. Acepta undefined como equivalente de false
    # (playlist legacy sin el campo).

  - id: "PLST-TC-018"
    titulo: "GET /api/playlist?uses_reels=true filtra a solo reels"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-2"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # Setup: crea 1 con true + 1 con false. ?uses_reels=true devuelve la primera
    # pero NO la segunda. Skip explicito si el server no soporta el param.

  - id: "PLST-TC-019"
    titulo: "GET /api/playlist?uses_reels=false usa $ne:true (legacy aparece)"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-2"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # Backward-compat: ?uses_reels=false usa $ne:true (no equality) para que
    # playlists legacy (sin el campo) aparezcan en este bucket. Si el server
    # uso $eq:false, el test falla con PLST-SKIP que apunta al handler.

  - id: "PLST-TC-020"
    titulo: "GET /api/playlist sin param uses_reels devuelve todas (backward-compat)"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["PLST-AC-2"]
      mitigates: []
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # Sin param el server NO debe filtrar. Crea 2 (true y false), ambas
    # deben aparecer en el listado.

  - id: "PLST-TC-021"
    titulo: "PUT /api/playlist/:id con uses_reels=false explicito PERSISTE el cambio"
    modulo: "playlist"
    tipo: "contract"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: ["PLST-RISK-X"]
      story: "US-026"
      spec: "tests/api/contract/playlist/playlist.api.contract.spec.js"
    # RED-HASTA-FIX del falsy bug de la saga #847. El PR #8076 introduce
    # normalizeBoolean en update.js. Si el server esta en la version vieja
    # del update.js, mandarle uses_reels=false NO persistira. Pasa a verde
    # cuando el PR se mergee a dev. Si el PR no esta mergeado, el spec salta
    # con PLST-SKIP (no podemos testear el toggle sin la base instalada).
