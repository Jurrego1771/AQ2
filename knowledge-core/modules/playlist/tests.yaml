  - id: "PLST-TC-1"
    titulo: "POST /api/playlist con nombre válido crea playlist manual (200, _id, type)"
    modulo: "playlist"
    tipo: "integration"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["PLST-AC-1"]
      mitigates: []
      story: "US-025"
      spec: "tests/api/playlist.api.spec.js"

  - id: "PLST-TC-2"
