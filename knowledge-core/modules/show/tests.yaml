# Tests - Modulo Show. Definicion (sin estado de ejecucion: eso es derivado).
# refs = FUENTE UNICA de los vinculos. El spec lleva en su titulo solo el id
# de correlacion @SHW-TC-N (+ la capa @smoke/@regression).
version: 1
modulo: "show"
ultima_actualizacion: '2026-06-23'

