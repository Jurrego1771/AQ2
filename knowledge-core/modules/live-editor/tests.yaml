# Tests - Modulo Live Editor. Definicion (sin estado de ejecucion: eso es derivado).
# refs = FUENTE UNICA de los vinculos. El spec lleva en su titulo solo el id de
# correlacion @LEDT-TC-N (+ la capa @api).
version: 1
modulo: "live-editor"
ultima_actualizacion: '2026-06-26'

tests:
