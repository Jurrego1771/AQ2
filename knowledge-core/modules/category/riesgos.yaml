  - id: "CAT-RISK-5"
    severidad: "high"
    probabilidad: "high"
    titulo: "Deploy parcial de PR #8507 en dev al 2026-07-14 (mejoro luego)"
    descripcion: >
      El PR #8507 (inherit_access) esta abierto al staging. Verificado en vivo:
        2026-07-14 primera corrida: deploy CASI nulo. GET/POST/PUT fallaban.
        2026-07-14 segunda corrida: deploy COMPLETO salvo el detail handler.
        OK    POST /api/category (con inherit_access=true) acepta y persiste
        OK    GET /api/category (basico) proyecta inherit_access en items frescos
        OK    GET /api/category?full=true proyecta inherit_access
        OK    GET /api/category?with_count=true proyecta inherit_access
        OK    POST /api/category/:id edita (responde 200 con doc actualizado)
        NO    GET /api/category/:id detail solo devuelve {_id, name, slug} (no proyecta inherit_access)
        NO    PUT /api/category/:id devuelve 404 (sm2 solo expone POST, no PUT)
    detonador:
      - "Detalle: GET /api/category/<id> de una categoria con inherit_access=true devuelve body sin el campo"
    mitigacion: >
      El unico test rojo legitimo hoy es CAT-INH-002 (detail handler). Cuando
      el dev agregue `inherit_access` al .select() del detail handler en
      src/server/routes/api/category/index.js, ese test pasa a verde. Los
      6 regression specs siguen vivos (test.fail) por CAT-RISK-6.
    archivos_afectados:
      - "src/server/routes/api/category/index.js (handler detail en /api/category/:id)"
    defectos_relacionados: []
    prioridad_prueba: "MUST"
    nota_industria: >
      Detalle: el deploy de un fix amplio en sm2 suele caer en varias piezas
      y rara vez llega completo a dev. Specs que verifican cada path
