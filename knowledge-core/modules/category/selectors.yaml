# Selectores del modulo Category. Cosechado en vivo (dev v7.0.71, 2026-07-08).
#
# La UI /admin/category NO es accesible con la cuenta QA botqa (403 Forbidden
# admin-only). Esta cosecha vino de /api/category con cookie de user, lo que
# solo confirma el shape de la respuesta HTTP. Para UI real, requiere setup
# admin en /admin/category (ver TOK-RISK-001).

version: 1
modulo: "category"
ultima_actualizacion: '2026-07-08'

# ---- API (GET /api/category) ----
api:
  list: "GET /api/category"
  detail: "GET /api/category/:category_id"
  shape_envelope: "jsonp { status: 'OK', data: ... }"
  shape_item_minimo: "_id, name, slug, description, parent, date_created, image_url, visible, track, drm, custom, filter_categories"
  auth_requerida: "MIDDLEWRITE.USER + MIDDLEWRITE.API_AUTH_READ (acepta cookies o x-api-token con profile valido)"
  respuesta_sin_auth: "403 INVALID_TOKEN (jsonp { status: 'ERROR', data: 'INVALID_TOKEN' })"
  response_codes:
    - "200 OK con array de categorias"
    - "200 OK con objeto categoria en detail"
    - "403 INVALID_TOKEN sin auth"
    - "404 NOT_FOUND para id inexistente"
