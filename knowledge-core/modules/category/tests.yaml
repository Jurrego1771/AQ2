# bootstrap) NO accesible desde el bot (ver CAT-RISK-9 nuevo): la nav del
# dashboard no expone /admin/category ni /settings/categories; las URLs
# devuelven 404. Cobertura UI queda como GAP hasta que se conceda acceso.

