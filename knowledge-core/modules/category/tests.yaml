    tipo: "inherit-regression"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.regression.spec.js"
    # Verde desde 2026-07-15. Confirma que grant-only se respeta.

  - id: "CAT-INH-R-005"
    titulo: "Activar inherit_access retroactivo NO otorga a hijos preexistentes (by-design)"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.regression.spec.js"
    # Verde desde 2026-07-15. By-design documentado en la UI: el flag no es
    # retroactivo.

  - id: "CAT-INH-R-006"
    titulo: "Mover categoria bajo parent inherit=true dispara la herencia (_parentModified)"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.regression.spec.js"
    # Verde desde 2026-07-15. Verifica _parentModified hook: mover una cat
    # bajo un parent con inherit=true la otorga al user.

  # ---- inherit_access gaps (R-007..R-013, segundo pase 2026-07-15) ----
  # Cubre el resto del qa_checklist del PR #8507 que la primera bateria dejo
  # pendiente: HU-2 (edit-sin-parent, parent=''), HU-5 (multi-user fan-out,
  # idempotencia del $addToSet, grant-only reforzado tras re-parent), y
  # cierre de CAT-RISK-5 (detail handler via POST update).

  - id: "CAT-INH-R-007"
    titulo: "Editar name sin cambiar parent NO dispara herencia"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.gaps.regression.spec.js"
    # Verde desde 2026-07-15. Valida el guard _parentModified del hook:
    # editar sin cambiar parent NO debe agregar ni quitar nada de
    # user.categories. Edge case de HU-2 ("solo movimiento real dispara").

  - id: "CAT-INH-R-008"
    titulo: "Mover categoria a parent='' (sin padre) NO otorga acceso"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.gaps.regression.spec.js"
    # Verde desde 2026-07-15. Confirmado: parent='' sale del path de
    # herencia porque _parentModified exige un parent no-vacio + heredante.

  - id: "CAT-INH-R-009"
    titulo: "POST /api/category/:id {inherit_access:false} (JSON) NO apaga flag true previo"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-8"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.gaps.regression.spec.js"
    # Verde desde 2026-07-15. Documenta vivo el bug CAT-RISK-8: con JSON
    # body explicito `false`, el guard del update.js no procesa el campo y
    # el flag previo sobrevive. Si se corrige, el spec pasa a verde con la
    # asercion invertida (acepta `false` como apagar explicito).

  - id: "CAT-INH-R-010"
    titulo: "Dos users simultaneos con acceso al parent heredan el child"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.gaps.regression.spec.js"
    # Verde desde 2026-07-15. El hook User.updateMany $addToSet debe cubrir
