  - id: "CAT-INH-R-012"
    titulo: "Idempotencia: la categoria aparece UNA sola vez en user.categories"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
      story: "US-035"
      spec: "tests/api/regression/category/category-inherit-access.gaps.regression.spec.js"
    # Verde desde 2026-07-15. $addToSet de Mongo es idempotente. Verificado:
