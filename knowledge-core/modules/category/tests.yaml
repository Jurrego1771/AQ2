  - id: "CAT-INH-R-011"
    titulo: "Re-parent del child NO remueve el grant ya otorgado"
    modulo: "category"
    tipo: "inherit-regression"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5", "CAT-RISK-6"]
