  - id: "CAT-INH-007"
    titulo: "POST /api/category {inherit_access:'false'} (form) NO activa el flag"
    modulo: "category"
    tipo: "inherit-smoke"
    prioridad: "medium"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-8"]
      story: "US-035"
      spec: "tests/api/smoke/category/category-inherit-access.smoke.spec.js"
    # Verde desde 2026-07-15: con form-encoding el string 'false' es truthy,
    # entra al guard, normalizeBoolean lo convierte a false. La categoria queda
    # con inherit_access=false/ausente. Cubre el camino de la UI actual (.coffee
    # envia form-encoded por default).

  - id: "CAT-INH-R-001"
    titulo: "Child bajo parent inherit=true se otorga a user.categories del parent (hook post-save)"
