  # ---- inherit_access (PR sm2#8507) ----
  # El flag `inherit_access` agrega hook post-save que hace $addToSet sobre
  # User.categories[] del subarbol nuevo cuando la categoria padre lo tiene
  # en true. La bateria la armo como pre-flight del fix. El 2026-07-14 el
  # deploy en dev esta PARCIAL (ver CAT-RISK-5): 5 specs pasan, 9 fallan
  # con mensaje claro "DEPLOY INCOMPLETO PR #8507: ...". Cuando el equipo
  # termine el deploy (GET by id proyecta, POST /api/category/:id existe),
  # los 9 rojos pasan a verde sin reescribir nada.

  - id: "CAT-INH-001"
    titulo: "POST /api/category sin inherit_access persiste default false/ausente"
    modulo: "category"
    tipo: "inherit-smoke"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: []
      story: "US-035"
      spec: "tests/api/smoke/category/category-inherit-access.smoke.spec.js"
    # Verde al 2026-07-14: el handler create.js acepta el body (o lo ignora) sin error.

  - id: "CAT-INH-002"
    titulo: "POST /api/category con inherit_access=true persiste y GET by id lo expone"
    modulo: "category"
    tipo: "inherit-smoke"
    prioridad: "high"
    estado: "expected-fail"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: ["CAT-RISK-5"]
      story: "US-035"
      spec: "tests/api/smoke/category/category-inherit-access.smoke.spec.js"
    # Rojo al 2026-07-14: POST acepta el flag pero GET /api/category/:id no lo proyecta.
    # Mensaje: "DEPLOY INCOMPLETO PR #8507: ... GET devolvio inherit_access=undefined".
    # Pasara a verde cuando el dev despliegue el cambio en src/server/routes/api/category/index.js
    # que selecciona inherit_access tambien en detail.

  - id: "CAT-INH-003"
    titulo: "GET /api/category (basico) proyecta inherit_access sobre categoria fresca"
    modulo: "category"
    tipo: "inherit-smoke"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["CAT-AC-3"]
      mitigates: []
      story: "US-035"
      spec: "tests/api/smoke/category/category-inherit-access.smoke.spec.js"
    # Verde al 2026-07-14: el listado basico popula inherit_access en items frescos.

  - id: "CAT-INH-003b"
