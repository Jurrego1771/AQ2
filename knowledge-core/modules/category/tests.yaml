#     del server descarta `false` explicito en JSON; con form-encoding el
#     string 'false' si se normaliza correctamente. CAT-RISK-8 documentado.
#   - CAT-INH-R-007..R-012 (regression gaps): cubren los AC pendientes de
#     HU-2 (edit-sin-parent, parent=''/null), HU-5 (multi-user fan-out,
#     idempotencia del $addToSet), grant-only reforzado (re-parent no
#     remueve).
