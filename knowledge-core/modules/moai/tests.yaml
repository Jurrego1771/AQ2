# Tests - Modulo MoAI (MoAI Options, /settings/ai). Definicion (sin estado de
# ejecucion: eso es derivado). refs = FUENTE UNICA de los vinculos.
version: 1
modulo: "moai"
ultima_actualizacion: '2026-07-14'

# Estrategia IA: CRUD/config/validacion = deterministas (asercion exacta). La
# invocacion viva (improve -> OpenAI) = contrato (estructura + ciclo completado),
# nunca el contenido generado. Paths capturados de la red real, no inferidos.

tests:
  - id: "MOAI-TC-1"
    titulo: "GET prompts responde 200 con lista estructurada"
    modulo: "moai"
    tipo: "integration"
    prioridad: "high"
    estado: "active"
    refs:
      validates: ["MOAI-AC-1"]
      mitigates: []
      story: "US-037"
      spec: "tests/api/integration/moai/moai-prompts.integration.spec.js"
