# Selectores del módulo Media — marcas sm: cosechadas en vivo (dev).
# Contrato estable para automatización: usar sm()/smPrefix() sobre estas marcas.
# No exhaustivo (la página de detalle tiene 233); se listan las útiles por área.
# Las marcas por-item llevan el id del documento -> usar smPrefix.
version: 1
modulo: "media"
ultima_actualizacion: '2026-07-03'
# nota: /api/show/list?all=true incluye shows de cualquier status (no solo OK);
# el picker de Show en media lo usaba y listaba shows borrados/duplicados
# (mediastream/sm2#8442, fix en sm2#8443). Ver riesgos.yaml MED-RISK-010.

# Navegación global (layout)
nav:
  media: "nav-header-media"
  dashboard: "nav-header-dashboard"
  # patrón: nav-header-<modulo>

# Listado /media (vista medias.coffee) — 193 marcas
listado:
  toolbar: "media-toolbar"
  total: "total-medias"            # OJO: duplicada x2 en DOM (#8) -> usar .first()
  loading: "medias-loading-icon"
  empty_state: "no-result"
  busqueda:
    input: "query-title"
    submit_visible: "smart-search" # 'search' es el botón oculto de advanced
  filtros:
    published: "filter-published"
    video: "filter-type-video"
    audio: "filter-type-audio"
    sin_categoria: "filter-without-category"
    chips_activos: "chip-filters"
  vista:
    grid: "display-grid"
    list: "display-list"
    minimal: "display-minimal-list"
  paginacion:
    next: "paginator-next"
    prev: "paginator-prev"
    # items-por-página: <select> SIN marca sm: (gap) -> localizar por option[value=96]
  items:
    card_prefix: "media-container-"   # smPrefix; incluye id
    title_prefix: "media-title-"
    description_prefix: "media-description-"
    # Estado Published/Not Published: texto plano dentro del card
    # (.label-published / .label-unpublished en list/minimal; ícono de color
    # .content-icon-status en grid), pero SIN marca sm: propia (gap, AQ2#35).
    # Leer vía innerText del card (marca real: card_prefix) en vez de por clase.
  # 3 layouts coexisten -> filtrar :visible al contar/leer

# Detalle/edición /media/:id (vista media.coffee) — 233 marcas
detalle:
  estructura:
    location_bar: "location-bar"
    player: "player"
    player_container: "player-container"
    alert: "alert"
    global_alert: "global-alert"     # mensajes de save/error
  basic_information:
    # NOTA: los campos editables NO tienen sm:, usan data-name (#13)
    root: "basic-information"
    title: 'input[data-name="title"]'
    description: 'textarea[data-name="description"]'
    categories: 'select[data-name="categories"]'   # widget Chosen (jQuery)
    shows: 'select[data-name="shows"]'   # picker de Show (seccion Show/Seasons/Episodes)
    # Toggle Status (Published/Not Published): bootstrap-toggle generico SIN
    # marca sm: (gap, AQ2#35). Hay varios .toggle mas en la pagina (ITG, Ads,
    # Access Restrictions); se localiza por el checkbox con data-on="Published".
    status_toggle: 'input[type="checkbox"][data-on="Published"]'
    tags: 'select[data-name="tags"]'
    permalink: 'input[data-name="permalink"]'
    metadata_generate: "metadata-generate"
    moai_settings: "moai-settings-button"          # config de metadata IA
  acciones:
    save: "save"
    delete: "delete"
    share: "share-action"
  metadata_embed:
    embed: "embed"
    metadata_id: "metadata-id"
    urls_hls: "metadata-urls-hls"
    urls_dash: "metadata-urls-dash"
    copy_embed: "copy-metadata"
  ad_markers:
    new: "new-ad-marker"            # crea YA en player.currentTime (no-op si =0); name fijo "Smart Ad Break"
    create: "create-ad-marker"      # abre modal #create-marker-modal (entrada manual)
    table: "adMarkers"              # tbody #ad-markers
    empty_message: "ad-markers-message"
    insertion_config: "ad-insertion-google"   # select de ad config a insertar
    # smart/IA (solo si la cuenta tiene media_smart_ad_markers y dura >= min): "regenerate-smart-ad-markers"
    modal_manual:
      root: "#create-marker-modal"
      time: "marker-time"          # HH:MM:SS, regex ^([0-9]{1,2}):([0-5][0-9]):([0-5][0-9])$
      duration_help: "marker-duration-help"   # "Media duration: HH:MM:SS"
      create: "create-marker-btn"
    # fila (compartida con tracks): trackOffset (HH:mm:ss), trackName (disabled), save-track, delete-track
    row_offset: "trackOffset"
    row_name: "trackName"
    row_save: "save-track"
    row_delete: "delete-track"
  # thumbnails / preview / sprite -> módulo aparte: modules/thumbnails/selectors.yaml (PFX THM)
  tracks_subtitles:
    new_track: "new-track"          # crea "Track N" en player.currentTime (no-op si =0)
    tracks: "tracks"               # ul #media-tracks
    tracks_empty: "tracks-message"  # "No tracks have been created"
    subtitles:
      container: "subtitles-container"
      list: "subtitles-list"       # table, oculta si vacío
      empty: "no-subtitles"        # "No subtitles have been added"
      search_import: "subtitle-search"
      # trigger "Upload Subtitles" -> a[href="#upload-subtitle"] (en seccion colapsable)
      upload_modal:
        root: "#upload-subtitle"
        name: "subtitle-name"      # requerido
        language: "subtitle-language"  # requerido (AutoComplete speech_language)
        text: "subtitle-text"
        time: "subtitle-time"
        save: "save-subtitle"      # disabled hasta: language + name + file. accept=.vtt,.ass,.srt
        delete: "delete-subtitle"
      # trigger "Auto Generate" -> a[href="#generate-subtitle"]
      generate_modal:               # IA speech-to-text
        root: "#generate-subtitle"
        name: "sub-name"           # requerido
        main_language: "sub-main-language"      # requerido
        secondary_languages: "sub-secondary-languages"
        generate: "generate-sub"   # disabled hasta name + main_language
    audio_tracks:                   # multiaudio (modal, oculto por defecto)
      container: "multiaudio"
      language: "audio-language"
      language_name: "audio-language-name"
      save: "save-new-audio-track"
      delete_language: null         # handler [sm="delete-audio-language"] (sin marca propia listada)
  ai_studio_tabs:
    persons: "tab-media-persons"
    keywords: "tab-media-keywords"
    labels: "tab-media-labels"
    sentiments: "tab-media-sentiments"
    emotions: "tab-media-emotions"
    ocr: "tab-media-ocr"
    captions: "tab-media-captions"
  generacion_ia:
    get_chapters: "get-chapters"
    get_highlights: "get-highlights"
    generate_transcription: "generate-transcription"
