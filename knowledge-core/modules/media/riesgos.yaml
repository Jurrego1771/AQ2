# Riesgos - Modulo Media (flujo de busqueda y listado)
# Poblado desde exploracion en vivo (dev) + codigo sm2. Defectos = issues GitHub.
version: 1
modulo: "media"
ultima_actualizacion: '2026-06-20'

riesgos:
  - id: "MED-RISK-001"
    severidad: "medium"
    probabilidad: "high"
    titulo: "Busqueda solo por palabra completa: parciales y subcadenas no encuentran media"
    descripcion: >
      La busqueda basica matchea solo palabras completas delimitadas (no prefijos
      ni subcadenas dentro de tokens unidos por "_"), pese a que el parametro se
      llama titleRules=contains. Un usuario que teclea parte de un titulo, nombre
      de archivo o ID autogenerado (qa_..._timestamp) obtiene "No results" y asume
      que el media no existe.
    detonador:
      - "Buscar un prefijo de palabra (ej: 'prob' de 'probe')"
      - "Buscar una subcadena dentro de un token con '_' (ej: 'p7oywycs')"
    mitigacion: >
      Implementar match por prefijo/substring para result sets cortos, o ajustar
      la affordance (placeholder honesto + Advanced Search) y documentar el comportamiento.
    archivos_afectados:
      - "src/client/partial/smart_searcher.coffee"
      - "src/client/medias.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#10"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Brightcove/JW/YouTube Studio hacen prefijo/substring. Nielsen #2 (match real world) y #6.

  - id: "MED-RISK-002"
    severidad: "medium"
    probabilidad: "high"
    titulo: "Contador de resultados obsoleto en busqueda sin coincidencias"
    descripcion: >
      Tras una busqueda sin resultados, el listado muestra el estado vacio pero el
      contador sigue mostrando el conteo de la busqueda anterior (ej: "of 1") en vez
      de 0. El estado del sistema es inconsistente con lo que se ve.
    detonador:
      - "Buscar un termino con N resultados y luego otro sin coincidencias"
    mitigacion: >
      Resetear el contador a 0 (o ocultarlo) cuando el resultado es vacio.
    archivos_afectados:
      - "src/client/medias.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#1"
    prioridad_prueba: "MUST"
    nota_industria: "Nielsen #1 - Visibilidad del estado del sistema."

  - id: "MED-RISK-003"
    severidad: "medium"
    probabilidad: "medium"
    titulo: "Estado de busqueda no persiste en URL: no compartible y se pierde al recargar"
    descripcion: >
      El termino de busqueda solo vive en estado en memoria; la URL no lo contiene
      (a diferencia de skip/sort). No se puede compartir la vista filtrada por enlace
      y un reload duro pierde la busqueda.
    detonador:
      - "Buscar y recargar la pagina"
      - "Copiar la URL para compartir una vista filtrada"
    mitigacion: >
      Codificar el termino (y filtros activos) en query/hash, como ya se hace con skip y sort.
    archivos_afectados:
      - "src/client/medias.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#2"
    prioridad_prueba: "MUST"
    nota_industria: "Nielsen #3 (control) y #7 (flexibilidad). Deep-link estandar en CMS de media."

  - id: "MED-RISK-004"
    severidad: "medium"
    probabilidad: "high"
    titulo: "Controles solo-icono sin nombre accesible (busqueda, vista, paginacion)"
    descripcion: >
      El boton de buscar, los toggles de vista y la paginacion son iconos sin
      aria-label ni texto. Un lector de pantalla no puede identificarlos.
    detonador:
      - "Navegar el modulo Media con un lector de pantalla / por teclado"
    mitigacion: >
      Agregar aria-label o texto visualmente oculto a los controles solo-icono.
    archivos_afectados:
      - "views/medias.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#6"
    prioridad_prueba: "SHOULD"
    nota_industria: "WCAG 2.1 - 4.1.2 Name, Role, Value (Nivel A)."

  - id: "MED-RISK-005"
    severidad: "low"
    probabilidad: "high"
    titulo: "Polling del encoder cada 5s indefinido aun con cola vacia"
    descripcion: >
      update_encoder_queue se reprograma cada 5s y consulta /api/encoder/job_list
      sin fin mientras se esta en Media, aun con 0 jobs, pese a existir websocket.
      ~720 requests/hora ociosas por pestania abierta.
    detonador:
      - "Permanecer en /media con la cola de encoder vacia"
    mitigacion: >
      Usar el websocket existente o hacer back-off/detener el polling cuando la cola
      esta vacia y en blur de pestania.
    archivos_afectados:
      - "src/client/medias.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#7"
    prioridad_prueba: "COULD"
    nota_industria: "Eficiencia de recursos; preferir push (socket) sobre polling continuo."

  - id: "MED-RISK-006"
    severidad: "medium"
    probabilidad: "medium"
    titulo: "Estado de filtros/per-page no en URL: deep-link inconsistente y filtro perdido al recargar"
    descripcion: >
      El estado del listado vive en tres mecanismos: URL (skip/sort), localStorage
      (per-page) y memoria (filtros/busqueda). Recargar una vista filtrada y paginada
      pierde el filtro pero mantiene el skip, dejando al usuario en otra pagina de
      otro conjunto sin aviso. La vista no es compartible por enlace.
    detonador:
      - "Filtrar por tipo, paginar y recargar la pagina"
      - "Compartir la URL de una vista filtrada"
    mitigacion: >
      Serializar todo el estado (filtros + per-page + termino + skip + sort) en la URL,
      como ya se hace con skip y sort.
    archivos_afectados:
      - "src/client/medias.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#11"
    prioridad_prueba: "MUST"
    nota_industria: "Nielsen #3 y #7. Deep-link de estado de listado estandar en CMS de media."

  - id: "MED-RISK-007"
    severidad: "medium"
    probabilidad: "medium"
    titulo: "Algunos media no se pueden guardar: POST 404 INVALID_SHOW_NOT_FOUND sin recurso en la UI"
    descripcion: >
      Al guardar ciertos media, el POST /api/media/:id responde 404 con
      INVALID_SHOW_NOT_FOUND y el cliente muestra "The show you are trying to
      save no longer exists". El media reporta show:null y la UI no expone campo
      de show para corregirlo, dejando el media inguardable sin workaround.
    detonador:
      - "Guardar un media afectado (referencia show/season/episode no resoluble en backend)"
    mitigacion: >
      El save debe ignorar/limpiar la referencia huerfana o exponer el campo para
      corregirla. Mensaje accionable.
    archivos_afectados:
      - "src/client/media.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#12"
    prioridad_prueba: "SHOULD"
    nota_industria: "Nielsen #9 (recuperarse de errores). 2/5 media probados afectados."

  - id: "MED-RISK-008"
    severidad: "low"
    probabilidad: "high"
    titulo: "Ad markers manuales etiquetados 'Smart Ad Break' y nombre no editable"
    descripcion: >
      Todo ad marker creado manualmente (via 'Add ad marker' o el modal 'Create Ad
      Marker') recibe el nombre fijo 'Smart Ad Break', el mismo de los breaks
      generados por el feature de IA. El campo de nombre de la fila esta disabled,
      asi que no se puede renombrar. No hay forma de distinguir un break manual de
      uno automatico, lo que confunde reporting/ad ops.
    detonador:
      - "Crear un ad marker manual por cualquiera de las dos vias"
    mitigacion: >
      Nombre por defecto neutro (ej. 'Ad Break') para markers manuales o permitir
      editarlo; reservar 'Smart Ad Break' para los generados por IA.
    archivos_afectados:
      - "src/client/media.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#14"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Nielsen #2 (lenguaje honesto) y #4 (consistencia). IAB: trazabilidad del origen del break.

  - id: "MED-RISK-009"
    severidad: "low"
    probabilidad: "medium"
    titulo: "Posicion de ad marker sin validacion server-side; quick-add y API la saltan"
    descripcion: >
      La unica validacion de rango vive en el modal cliente 'Create Ad Marker'
      (rechaza position > duration, con '>' no '>=', sin cota inferior). Se saltea
      por (a) el quick-add 'Add ad marker' (new-ad-marker) que crea desde el
      playhead sin validar, y (b) la API POST /track, que guarda req.body.position
      tal cual (track/create.js no valida). Un break >= duracion nunca se dispara;
      uno <= 0 se solapa con preroll.
    detonador:
      - "Quick-add 'Add ad marker' con el playhead al final (position == duracion)"
      - "POST /api/media/:id/track con position > duration (verificado: persiste)"
    mitigacion: >
      Validar 0 < position < duration en el servidor (track/create.js) y endurecer
      el cliente a rango abierto (create-marker-btn, save-track).
    archivos_afectados:
      - "src/server/routes/api/media/track/create.js"
      - "src/client/media.coffee"
    defectos_relacionados:
      - "Jurrego1771/AQ2#15"
    prioridad_prueba: "SHOULD"
    nota_industria: >
      Nielsen #5 (prevencion de errores). Validacion server-side: no confiar solo en el cliente.
