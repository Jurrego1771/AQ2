# Riesgos - Modulo Fast Channel. Poblado desde exploracion en vivo (F0-F1, 2026-07-14)
# + lectura de sm2. Defectos = issues GitHub. Prefijo FCH.
version: 1
modulo: "fast-channel"
ultima_actualizacion: '2026-07-14'

riesgos:
  - id: "FCH-RISK-1"
    severidad: "high"
    probabilidad: "medium"
    titulo: "Sincronizacion COMPLETA programacion -> schedule-jobs del live (publish) sin cobertura"
    descripcion: >
      Contrato del Save & Publish YA capturado (2026-07-14): POST
      /fast-channel/advanced/:id/plannerItems/saveItems (plannerId + items +
      operation:replace) + POST /advanced/:id/schedule. Un item FUTURO via
      saveItems responde insertedCount:1 y deja el planner "published"; los items
      en el PASADO se descartan. PERO el live vinculado
      (GET /api/live-stream/:liveId/schedule-job) SIGUE en 0 schedule-jobs de
      forma inmediata/sincrona tras publicar -> la materializacion planner ->
      schedule-jobs del live parece DIFERIDA por un scheduler backend (async), no
      inmediata por API. NO confirmado si es bug o comportamiento async esperado.
      Es el riesgo central a vigilar (la sincronizacion que el usuario quiere probar).
    detonador:
      - "Publicar un item futuro (saveItems) y consultar GET /api/live-stream/:liveId/schedule-job"
    mitigacion: >
      Confirmar con dev si la materializacion al live es asincrona (scheduler) y
      su ventana de tiempo. Si es async: test con poll de timeout amplio (o un
      trigger explicito) que asrte que el schedule-job aparece en el live tras
      publicar; si deberia ser sincrona y no ocurre, es bug -> filar. Contrato del
      publish ya conocido (ver overview / memoria fast-channel).
    archivos_afectados:
      - "dev-api.platform.mediastre.am /fast-channel/:id/schedule (publish, backend separado)"
      - "sm2 src/server/routes/api/live-stream/schedule-job/{createScheduleJob,deleteFastScheduleJob}.js"
    defectos_relacionados: []
    prioridad_prueba: "MUST"

  - id: "FCH-RISK-5"
    severidad: "medium"
    probabilidad: "high"
    titulo: "El nombre del fast channel no se valida bien (espacios en create, cualquier valor en update)"
    descripcion: >
      Validacion de nombre inconsistente: create rechaza name="" (400) pero
      acepta name="   " (solo espacios, falta trim) -> crea canal + live con
      nombre en blanco. El update (POST /fast-channel/:id) NO valida el nombre
      en absoluto: acepta name="" y name="   ", dejando el canal sin nombre.
      Genera canales/lives/MediaLive ilegibles y dificiles de gestionar.
    detonador:
      - "POST /fast-channel con name espacios; POST /fast-channel/:id con name vacio o espacios"
    mitigacion: >
      Aplicar trim + validacion required de name tanto en create como en update.
      Pruebas vivas FCH-TC-4 (create) y FCH-TC-8 (update) en rojo-esperado.
    archivos_afectados:
      - "dev-api.platform.mediastre.am /fast-channel (create) y /fast-channel/:id (update)"
    defectos_relacionados: ["Jurrego1771/AQ2#56"]
    prioridad_prueba: "MUST"

  - id: "FCH-RISK-2"
    severidad: "low"
    probabilidad: "high"
    titulo: "Micro-frontend de Fast Channel sin marcas sm:/data-testid (testabilidad)"
    descripcion: >
      La Advanced View es un micro-frontend (v5.2.381) que no expone el contrato
      de selectores del admin (sm:) ni data-testid/data-name. Cualquier cobertura
      UI dependeria de getByRole/estructura (fragil). No bloquea (se puede cubrir
      por API contra dev-api), pero es deuda de testabilidad del front.
    detonador:
      - "Intentar automatizar la Advanced View por selectores estables"
    mitigacion: >
      Pedir al front marcas estables (sm:/data-testid) en la Advanced View.
      Mientras tanto, preferir cobertura por API (dev-api, x-api-token).
    archivos_afectados:
      - "micro-frontend fast-channel advanced (v5.2.381)"
    defectos_relacionados: []
    prioridad_prueba: "COULD"

  - id: "FCH-RISK-3"
    severidad: "low"
    probabilidad: "medium"
    titulo: "Crear fast channel por UI no dispara el POST bajo el harness (sin confirmar)"
    descripcion: >
      El boton Create del modal "Create Fast Channel" no envio ninguna peticion
      al backend bajo el harness Playwright MCP (2 intentos, con y sin caracteres
      especiales en el nombre). No confirmado como bug de producto: probable
      friccion entre el click sintetico y los handlers de React del micro-frontend.
      Requiere verificacion con otro metodo (click nativo / manual) antes de filar.
    detonador:
      - "Click en Create del modal de creacion via Playwright MCP"
    mitigacion: >
      Verificar con click nativo o manual. Para automatizar, capturar el contrato
      del POST de creacion y crear por API contra dev-api (ojo: crea recursos
      MediaLive reales; mapear antes el DELETE para teardown self-contained).
    archivos_afectados:
      - "micro-frontend fast-channel advanced (modal Create Fast Channel)"
    defectos_relacionados: []
    prioridad_prueba: "SHOULD"

  - id: "FCH-RISK-4"
    severidad: "medium"
    probabilidad: "low"
    titulo: "Crear fast channel genera recursos MediaLive reales (costo)"
    descripcion: >
      Cada fast channel crea un canal MediaLive + live vinculado + endpoint RTMP
      reales (~25s por creacion). RESUELTO el teardown: DELETE /fast-channel/:id
      (200) borra el fast channel Y el live vinculado en cascada (verificado
      2026-07-14). Los tests son self-contained (crean y borran su canal). Riesgo
      residual: correr muchos tests en paralelo crearia varios MediaLive a la vez.
    detonador:
      - "Correr la suite de fast-channel repetidamente / en paralelo"
    mitigacion: >
      Tests self-contained con DELETE en afterEach (ya implementado). Preferir
      --workers=1 o pocos workers para esta suite. En prod: prodGuard (skip).
    archivos_afectados:
      - "dev-api.platform.mediastre.am /fast-channel (create) y DELETE /fast-channel/:id"
    defectos_relacionados: []
    prioridad_prueba: "SHOULD"
